            const [tab, setTab] = React.useState('home');
            const [moms, setMoms] = React.useState(INITIAL_MOMS);
            const [selMOM, setSelMOM] = React.useState(null);
            const [editMOM, setEditMOM] = React.useState(null);
            const [showSig, setShowSig] = React.useState(false);
            const [showNotif, setShowNotif] = React.useState(false);
            const [showUserMenu, setShowUserMenu] = React.useState(false);
            const [showChangePIN, setShowChangePIN] = React.useState(false);
            const unread = NOTIFICATIONS.filter(n => !n.read).length;
            const isManager = currentUser?.role === 'Society Manager';

            const goTab = t => { setTab(t); setView(t === 'create' ? 'create' : 'tab'); };
            const goMOM = m => { setSelMOM(m); setView('detail'); };
            const goBack = () => { setEditMOM(null); setView('tab'); setTab(prev => prev === 'create' ? 'home' : prev); };
            const logout = () => { setCurrentUser(null); setView('tab'); setTab('home'); setShowUserMenu(false); };

            const saveMOM = m => {
                // Replace existing if editing, otherwise prepend
                setMoms(prev => prev.some(x => x.id === m.id) ? prev.map(x => x.id === m.id ? m : x) : [m, ...prev]);
                setEditMOM(null);
                setTab('home');
                setView('tab');
            };

            const doSign = sigData => {
                const updated = moms.map(m => {
                    if (m.id !== selMOM.id) return m;
                    const sigs = [...m.signatures, { userId: currentUser.id, timestamp: sigData.timestamp, type: sigData.type, data: sigData.data }];
                    const done = m.officeBearers.every(id => sigs.some(s => s.userId === id));
                    const trail = [...m.auditTrail, { action: 'Signed', user: currentUser.name, ts: sigData.timestamp }];
                    return { ...m, signatures: sigs, status: done ? 'Fully Signed' : 'Partially Signed', auditTrail: trail };
                });
                setMoms(updated);
                setSelMOM(updated.find(m => m.id === selMOM.id));
                setShowSig(false);
            };

            const addComment = (momId, newComment) => {
                const updated = moms.map(m => m.id === momId ? { ...m, comments: [...m.comments, newComment] } : m);
                setMoms(updated);
                setSelMOM(updated.find(m => m.id === momId));
            };

            const editDraftMOM = () => {
                setEditMOM(selMOM);
                setView('create');
            };

            const publishDraftMOM = () => {
                const now = new Date().toISOString();
                const updated = moms.map(m => {
                    if (m.id !== selMOM.id) return m;
                    return { ...m, status: 'Under Review', auditTrail: [...m.auditTrail, { action: 'Published', user: currentUser.name, ts: now }] };
                });
                setMoms(updated);
                setSelMOM(updated.find(m => m.id === selMOM.id));
            };

            // Show login if not authenticated
            if (!currentUser) return <LoginScreen onLogin={u => { setCurrentUser(u); setView('tab'); setTab('home'); }} />;

            const showTabBar = view !== 'detail' && view !== 'create';

            return (
                <>
                    {/* Top Bar */}
                    <div className="topbar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            {view === 'detail' && (
                                <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '6px 8px 6px 0', color: '#475569', display: 'flex', alignItems: 'center' }} onClick={goBack}>
                                    <Icon n="arrowLeft" size={22} />
                                </button>
                            )}
                            <div style={{ width: 34, height: 34, background: '#4f46e5', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff' }}>
                                <Icon n="shield" size={18} color="#fff" />
                            </div>
                            <div>
                                <div style={{ fontWeight: 800, fontSize: 14, lineHeight: 1 }}>Smart MOM</div>
                                <div style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600 }}>Digital Signature Portal</div>
                            </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <button onClick={() => setShowNotif(!showNotif)} style={{ background: 'none', border: 'none', cursor: 'pointer', position: 'relative', padding: 6, color: '#475569' }}>
                                <Icon n="bell" size={22} />
                                {unread > 0 && <span style={{ position: 'absolute', top: 4, right: 4, width: 8, height: 8, background: '#ef4444', borderRadius: '50%', border: '2px solid #fff' }} />}
                            </button>
                            {/* Avatar + menu */}
                            <div style={{ position: 'relative' }}>
                                <button onClick={() => setShowUserMenu(!showUserMenu)} style={{ width: 34, height: 34, borderRadius: '50%', background: currentUser.color, border: '2px solid rgba(255,255,255,.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 12, color: '#fff', cursor: 'pointer', fontFamily: 'inherit' }}>
                                    {currentUser.initials}
                                </button>
                                {showUserMenu && (
                                    <div style={{ position: 'absolute', right: 0, top: 42, background: '#fff', borderRadius: 14, boxShadow: '0 8px 32px rgba(0,0,0,.15)', border: '1px solid #f1f5f9', width: 220, zIndex: 200, overflow: 'hidden' }} onClick={e => e.stopPropagation()}>
                                        <div style={{ padding: '14px 16px', borderBottom: '1px solid #f8fafc' }}>
                                            <div style={{ fontWeight: 700, fontSize: 14 }}>{currentUser.name}</div>
                                            <div style={{ fontSize: 12, color: '#94a3b8', marginTop: 2 }}>{currentUser.role}{currentUser.wing ? ' · ' + currentUser.wing : ''}</div>
                                        </div>
                                        <button onClick={() => { setShowChangePIN(true); setShowUserMenu(false); }} style={{ width: '100%', padding: '12px 16px', border: 'none', background: 'none', cursor: 'pointer', color: '#4f46e5', fontWeight: 700, fontSize: 13, textAlign: 'left', fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 8, borderBottom: '1px solid #f8fafc' }}>
                                            <span style={{ fontSize: 16 }}>🔑</span> Change PIN
                                        </button>
                                        <button onClick={logout} style={{ width: '100%', padding: '12px 16px', border: 'none', background: 'none', cursor: 'pointer', color: '#ef4444', fontWeight: 700, fontSize: 13, textAlign: 'left', fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 8 }}>
                                            <span style={{ fontSize: 16 }}>🚪</span> Sign Out
                                        </button>
                                    </div>
                                )}
                                {showUserMenu && <div style={{ position: 'fixed', inset: 0, zIndex: 199 }} onClick={() => setShowUserMenu(false)} />}
                            </div>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="page">
                        {view === 'tab' && tab === 'home' && <Dashboard moms={moms} onMOM={goMOM} onCreate={isManager ? () => goTab('create') : null} currentUser={currentUser} />}
                        {view === 'tab' && tab === 'moms' && <MOMsView moms={moms} onMOM={goMOM} />}
                        {view === 'tab' && tab === 'audit' && <AuditView moms={moms} />}
                        {view === 'create' && isManager && <CreateMOM onBack={goBack} onSave={saveMOM} currentUser={currentUser} editMOM={editMOM} />}
                        {view === 'detail' && selMOM && <MOMDetail mom={selMOM} onBack={goBack} onSign={() => setShowSig(true)} onAddComment={addComment} onEdit={editDraftMOM} onPublish={publishDraftMOM} currentUser={currentUser} />}
                    </div>

                    {/* Bottom Tab Bar */}
                    {showTabBar && (
                        <div className="tabbar">
                            <button className={tab === 'home' ? 'active' : ''} onClick={() => goTab('home')}>
                                <Icon n="home" size={20} /><span>Home</span>
                            </button>
                            {isManager && (
                                <button onClick={() => goTab('create')}>
                                    <Icon n="plus" size={20} /><span>Create</span>
                                </button>
                            )}
                            <button className={tab === 'moms' ? 'active' : ''} onClick={() => goTab('moms')}>
                                <Icon n="fileText" size={20} /><span>MOMs</span>
                            </button>
                            <button className={tab === 'audit' ? 'active' : ''} onClick={() => goTab('audit')}>
                                <Icon n="history" size={20} /><span>Audit</span>
                            </button>
                        </div>
                    )}

                    {/* Notifications */}
                    {showNotif && <NotifPanel onClose={() => setShowNotif(false)} />}

                    {/* Signature Modal */}
                    {showSig && (
                        <Modal title="Digital Signature" onClose={() => setShowSig(false)}>
                            <SignaturePad user={currentUser} onSign={doSign} onCancel={() => setShowSig(false)} />
                        </Modal>
                    )}

                    {/* Change PIN Modal */}
                    {showChangePIN && (
                        <ChangePINModal
                            user={currentUser}
                            onClose={() => setShowChangePIN(false)}
                            onChanged={() => setShowChangePIN(false)}
                        />
                    )}
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);


    </script>
</body>

</html>
