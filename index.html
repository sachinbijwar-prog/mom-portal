<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Smart MOM – Society Meeting Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@600&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            overscroll-behavior: none
        }

        #root {
            min-height: 100vh
        }

        .sig-font {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #3730a3
        }

        canvas {
            touch-action: none
        }

        .fade {
            animation: fadeIn .25s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        textarea,
        input {
            font-family: 'Inter', sans-serif
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .3px
        }

        .badge-draft {
            background: #f1f5f9;
            color: #64748b
        }

        .badge-review {
            background: #fef3c7;
            color: #b45309
        }

        .badge-partial {
            background: #dbeafe;
            color: #1d4ed8
        }

        .badge-signed {
            background: #d1fae5;
            color: #065f46
        }

        .card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .06)
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border-radius: 12px;
            transition: all .15s;
            active: transform:scale(.97)
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
            box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
        }

        .btn-primary:hover {
            background: #4338ca
        }

        .btn-secondary {
            background: #fff;
            color: #334155;
            border: 1px solid #e2e8f0
        }

        .btn-secondary:hover {
            background: #f8fafc
        }

        .btn-danger {
            background: #ef4444;
            color: #fff
        }

        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, .9);
            backdrop-filter: blur(12px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            z-index: 100;
            padding: 8px 0 env(safe-area-inset-bottom)
        }

        .tabbar button {
            flex: 1;
            border: none;
            background: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: #94a3b8;
            padding: 4px 0;
            font-family: 'Inter', sans-serif
        }

        .tabbar button.active {
            color: #4f46e5
        }

        .tabbar svg {
            width: 20px;
            height: 20px;
            stroke-width: 2
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #f1f5f9;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .page {
            padding: 16px 16px 90px;
            max-width: 640px;
            margin: 0 auto
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .06)
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .4);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center
        }

        .modal-box {
            background: #fff;
            width: 100%;
            max-width: 640px;
            border-radius: 24px 24px 0 0;
            padding: 0 0 env(safe-area-inset-bottom);
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp .25s ease
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: none
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 1px solid #f8fafc;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border .15s;
            background: #fff;
            font-family: inherit
        }

        .input-field:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            display: block
        }

        .comment-bubble {
            background: #f8fafc;
            border-radius: 12px 12px 12px 2px;
            padding: 10px 14px
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #475569
        }

        .chip.selected {
            background: #4f46e5;
            color: #fff;
            border-color: #4f46e5;
            box-shadow: 0 2px 8px rgba(79, 70, 229, .3)
        }

        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            border-radius: 14px;
            border: 1.5px solid #f1f5f9;
            cursor: pointer;
            transition: all .15s;
            background: #fff
        }

        .user-row.selected {
            border-color: #c7d2fe;
            background: #eef2ff
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            background: #e2e8f0;
            color: #475569;
            flex-shrink: 0
        }

        .sig-tab-bar {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            gap: 4px
        }

        .sig-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 8px;
            color: #94a3b8;
            font-family: inherit;
            transition: all .15s
        }

        .sig-tab.active {
            background: #fff;
            color: #4f46e5;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1)
        }

        .timeline-item {
            display: flex;
            gap: 12px;
            padding-bottom: 16px;
            position: relative
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 17px;
            top: 34px;
            bottom: 0;
            width: 1px;
            background: #e2e8f0
        }

        .timeline-item:last-child::before {
            display: none
        }

        .tl-dot {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #4f46e5
        }

        svg.icon {
            display: inline-block;
            vertical-align: middle
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        /* ─────────────────────────── DATA ─────────────────────────── */
        const USERS = [
            { id: 'u1', username: 'akshay', name: 'Akshay Paygude', role: 'Society Manager', wing: '', initials: 'AP', pin: '1234', color: '#4f46e5' },
            { id: 'u2', username: 'sachin', name: 'Sachin Bijwar', role: 'Chairman', wing: 'D Wing', initials: 'SB', pin: '2345', color: '#0891b2' },
            { id: 'u3', username: 'nazzar', name: 'Nazzar', role: 'Secretary', wing: 'D Wing', initials: 'NZ', pin: '3456', color: '#059669' },
            { id: 'u4', username: 'alhad', name: 'Alhad Saraf', role: 'Treasurer', wing: 'D Wing', initials: 'AS', pin: '4567', color: '#d97706' },
        ];
        const WINGS = ['A Wing', 'B Wing', 'C Wing', 'D Wing', 'Clubhouse', 'General Area'];
        const INITIAL_MOMS = [
            {
                id: 'm1', title: 'Annual General Body Meeting 2024', date: '2024-03-15', time: '18:30', wings: ['General Area'],
                agenda: 'Financial audit review and AMC renewal discussion.',
                content: 'Meeting started at 6:30 PM. Treasurer presented the annual audit report showing a surplus of ₹2.4L. 90% of members voted to renew the security agency contract. Lift AMC was approved for ₹85,000 annually.',
                status: 'Fully Signed', createdBy: 'u1', createdAt: '2024-03-15T20:00:00Z',
                officeBearers: ['u2', 'u3', 'u4'],
                signatures: [
                    { userId: 'u2', timestamp: '2024-03-16T10:00:00Z', type: 'typed' },
                    { userId: 'u3', timestamp: '2024-03-16T11:30:00Z', type: 'drawn' },
                    { userId: 'u4', timestamp: '2024-03-17T09:15:00Z', type: 'typed' },
                ],
                comments: [{ id: 'c1', userId: 'u2', text: 'Audit values verified and approved.', ts: '2024-03-16T09:45:00Z' }],
                auditTrail: [
                    { action: 'Created', user: 'Sachin Bijwar', ts: '2024-03-15T20:00:00Z' },
                    { action: 'Published', user: 'Sachin Bijwar', ts: '2024-03-15T20:05:00Z' },
                    { action: 'Signed', user: 'Amit Sharma', ts: '2024-03-16T10:00:00Z' },
                    { action: 'Signed', user: 'Priya Verma', ts: '2024-03-16T11:30:00Z' },
                    { action: 'Signed', user: 'Rahul Gupta', ts: '2024-03-17T09:15:00Z' },
                ]
            },
            {
                id: 'm2', title: 'Monthly Committee Meeting – April 2024', date: '2024-04-10', time: '20:00', wings: ['A Wing', 'B Wing'],
                agenda: 'Leaking pipes in B Wing and lift maintenance in A Wing.',
                content: 'Discussed urgent plumbing repairs in B Wing flat 304-308. Three vendor quotes reviewed: ₹42k, ₹38k, ₹51k. Committee approved vendor 2 at ₹38,000. A Wing lift scheduled for service on 15th April.',
                status: 'Under Review', createdBy: 'u1', createdAt: '2024-04-10T22:00:00Z',
                officeBearers: ['u2', 'u3'],
                signatures: [],
                comments: [{ id: 'c2', userId: 'u3', text: 'Please add pipe specifications and brand used.', ts: '2024-04-11T09:00:00Z' }],
                auditTrail: [
                    { action: 'Created', user: 'Sachin Bijwar', ts: '2024-04-10T22:00:00Z' },
                    { action: 'Published', user: 'Sachin Bijwar', ts: '2024-04-11T08:00:00Z' },
                ]
            },
        ];
        const NOTIFICATIONS = [
            { id: 1, text: 'New MOM published: Monthly Committee Meeting – April 2024', read: false, time: '2 hrs ago' },
            { id: 2, text: 'Amit Sharma signed AGM 2024 MOM', read: true, time: '1 day ago' },
            { id: 3, text: 'Reminder: Monthly MOM awaiting your signature', read: false, time: '3 hrs ago' },
        ];

        /* ─────────────────────────── ICONS (inline SVG) ─────────────────────────── */
        const icons = {
            shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
            bell: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" /></svg>,
            plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
            home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
            fileText: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /></svg>,
            clock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
            check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><polyline points="20 6 9 17 4 12" /></svg>,
            arrowLeft: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>,
            send: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>,
            pen: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" /></svg>,
            refresh: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" /></svg>,
            upload: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><polyline points="16 16 12 12 8 16" /><line x1="12" y1="12" x2="12" y2="21" /><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3" /></svg>,
            shield2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><polyline points="9 12 11 14 15 10" /></svg>,
            history: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 102.13-9.36L1 10" /></svg>,
            calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
            users: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" /></svg>,
            x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
            info: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>,
            checkCircle: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>,
            bold: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><path d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z" /><path d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z" /></svg>,
            list: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="icon"><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></svg>,
        };
        const Icon = ({ n, size = 20, color }) => {
            const el = icons[n];
            if (!el) return null;
            return React.cloneElement(el, { style: { width: size, height: size, stroke: color || 'currentColor', strokeWidth: 2 } });
        };

        /* ─────────────────────────── HELPERS ─────────────────────────── */
        const fmtDate = d => new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        const fmtTime = ts => new Date(ts).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        const userMap = Object.fromEntries(USERS.map(u => [u.id, u]));

        // Load any saved PINs from localStorage
        USERS.forEach(u => {
            const saved = localStorage.getItem('pin_' + u.id);
            if (saved) u.pin = saved;
        });

        /* ─────────────────────────── CHANGE PIN MODAL ─────────────────────────── */
        const ChangePINModal = ({ user, onClose, onChanged }) => {
            const [step, setStep] = React.useState('current'); // current | new | confirm
            const [currentPin, setCurrentPin] = React.useState('');
            const [newPin, setNewPin] = React.useState('');
            const [confirmPin, setConfirmPin] = React.useState('');
            const [error, setError] = React.useState('');
            const [shake, setShake] = React.useState(false);
            const [success, setSuccess] = React.useState(false);

            const digits = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '', '0', '⌫'];

            const activePin = step === 'current' ? currentPin : step === 'new' ? newPin : confirmPin;
            const setActivePin = step === 'current' ? setCurrentPin : step === 'new' ? setNewPin : setConfirmPin;

            const doError = msg => { setError(msg); setShake(true); setActivePin(''); setTimeout(() => setShake(false), 500); };

            const pressDigit = d => {
                if (d === '⌫') { setActivePin(p => p.slice(0, -1)); setError(''); return; }
                if (activePin.length >= 4) return;
                const next = activePin + d;
                setActivePin(next);
                if (next.length === 4) {
                    setTimeout(() => {
                        if (step === 'current') {
                            if (next !== user.pin) { doError('Incorrect current PIN'); }
                            else { setError(''); setStep('new'); }
                        } else if (step === 'new') {
                            if (next === user.pin) { doError('New PIN must be different from current PIN'); }
                            else { setError(''); setStep('confirm'); }
                        } else {
                            if (next !== newPin) { doError('PINs do not match. Try again.'); setStep('new'); setNewPin(''); }
                            else {
                                // Save new PIN
                                user.pin = newPin;
                                localStorage.setItem('pin_' + user.id, newPin);
                                setSuccess(true);
                                setTimeout(() => { onChanged(); onClose(); }, 1400);
                            }
                        }
                    }, 200);
                }
            };

            const stepInfo = {
                current: { label: 'Enter your current PIN', emoji: '🔒' },
                new: { label: 'Enter your new 4-digit PIN', emoji: '✨' },
                confirm: { label: 'Confirm your new PIN', emoji: '✅' },
            }[step];

            return (
                <div className="modal-overlay">
                    <div className="modal-box" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <span style={{ fontSize: 16, fontWeight: 700 }}>Change PIN</span>
                            <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#94a3b8' }} onClick={onClose}>
                                <Icon n="x" size={22} />
                            </button>
                        </div>
                        <div style={{ padding: '24px 20px' }}>
                            {success ? (
                                <div style={{ textAlign: 'center', padding: '24px 0' }}>
                                    <div style={{ fontSize: 56, marginBottom: 12 }}>✅</div>
                                    <div style={{ fontWeight: 800, fontSize: 18, color: '#059669' }}>PIN Changed!</div>
                                    <p style={{ color: '#94a3b8', fontSize: 13, marginTop: 6 }}>Your new PIN has been saved securely.</p>
                                </div>
                            ) : (
                                <>
                                    {/* Step indicator */}
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 20 }}>
                                        {['current', 'new', 'confirm'].map((s, i) => (
                                            <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                <div style={{
                                                    width: 28, height: 28, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 12,
                                                    background: step === s ? '#4f46e5' : ['current', 'new', 'confirm'].indexOf(step) > i ? '#10b981' : '#f1f5f9',
                                                    color: step === s || ['current', 'new', 'confirm'].indexOf(step) > i ? '#fff' : '#94a3b8'
                                                }}>
                                                    {['current', 'new', 'confirm'].indexOf(step) > i ? '✓' : (i + 1)}
                                                </div>
                                                {i < 2 && <div style={{ width: 20, height: 2, background: ['current', 'new', 'confirm'].indexOf(step) > i ? '#10b981' : '#f1f5f9', borderRadius: 2 }} />}
                                            </div>
                                        ))}
                                    </div>

                                    <div style={{ textAlign: 'center', marginBottom: 20 }}>
                                        <div style={{ fontSize: 32, marginBottom: 8 }}>{stepInfo.emoji}</div>
                                        <p style={{ margin: 0, fontWeight: 700, color: '#334155' }}>{stepInfo.label}</p>
                                    </div>

                                    {/* PIN dots */}
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: 14, marginBottom: 8 }}>
                                        {[0, 1, 2, 3].map(i => (
                                            <div key={i} style={{ width: 14, height: 14, borderRadius: '50%', border: '2px solid #e2e8f0', background: activePin.length > i ? '#4f46e5' : 'transparent', transition: 'background .15s' }} />
                                        ))}
                                    </div>
                                    {error && <p style={{ color: '#ef4444', fontSize: 12, textAlign: 'center', marginBottom: 8 }}>{error}</p>}
                                    <p style={{ color: '#94a3b8', fontSize: 11, textAlign: 'center', marginBottom: 20 }}>Enter 4 digits</p>

                                    {/* Numpad */}
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
                                        {digits.map((d, i) => d === '' ? <div key={i} /> : (
                                            <button key={i} onClick={() => pressDigit(d)}
                                                style={{
                                                    padding: '16px 0', background: d === '⌫' ? '#fff5f5' : '#f8fafc', border: '1.5px solid',
                                                    borderColor: d === '⌫' ? '#fecaca' : '#e2e8f0',
                                                    borderRadius: 12, color: d === '⌫' ? '#ef4444' : '#334155',
                                                    fontSize: 18, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', transition: 'all .1s'
                                                }}>
                                                {d}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── LOGIN SCREEN ─────────────────────────── */
        const LoginScreen = ({ onLogin }) => {
            const [username, setUsername] = React.useState('');
            const [pin, setPin] = React.useState('');
            const [showPin, setShowPin] = React.useState(false);
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleLogin = e => {
                e && e.preventDefault();
                if (!username.trim() || !pin.trim()) { setError('Please enter username and PIN.'); return; }
                setLoading(true);
                setTimeout(() => {
                    const user = USERS.find(u => u.username.toLowerCase() === username.trim().toLowerCase());
                    if (!user) { setError('Username not found.'); setLoading(false); return; }
                    if (pin !== user.pin) { setError('Incorrect PIN. Please try again.'); setPin(''); setLoading(false); return; }
                    setError('');
                    onLogin(user);
                }, 600);
            };

            const roleIcon = r => ({ 'Society Manager': '🏢', 'Chairman': '👑', 'Secretary': '📋', 'Treasurer': '💰' }[r] || '👤');

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#4338ca 100%)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '24px 20px' }}>

                    {/* Logo */}
                    <div style={{ textAlign: 'center', marginBottom: 36 }}>
                        <div style={{ width: 68, height: 68, background: 'rgba(255,255,255,.15)', borderRadius: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px', backdropFilter: 'blur(10px)', border: '1.5px solid rgba(255,255,255,.2)', fontSize: 34 }}>
                            🏛️
                        </div>
                        <h1 style={{ margin: 0, color: '#fff', fontSize: 26, fontWeight: 800, letterSpacing: -.5 }}>Smart MOM</h1>
                        <p style={{ margin: '6px 0 0', color: 'rgba(255,255,255,.55)', fontSize: 13, fontWeight: 500 }}>Society Meeting Minutes Portal</p>
                    </div>

                    {/* Form Card */}
                    <div style={{ width: '100%', maxWidth: 380, background: 'rgba(255,255,255,.08)', backdropFilter: 'blur(20px)', borderRadius: 24, border: '1.5px solid rgba(255,255,255,.15)', padding: 28 }}>
                        <h2 style={{ margin: '0 0 22px', color: '#fff', fontSize: 18, fontWeight: 700 }}>Sign In</h2>

                        <form onSubmit={handleLogin} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                            {/* Username */}
                            <div>
                                <label style={{ display: 'block', color: 'rgba(255,255,255,.7)', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: .8, marginBottom: 8 }}>Username</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={e => { setUsername(e.target.value); setError(''); }}
                                    placeholder="e.g. sachin"
                                    autoComplete="username"
                                    style={{ width: '100%', padding: '13px 16px', background: 'rgba(255,255,255,.1)', border: '1.5px solid rgba(255,255,255,.2)', borderRadius: 12, color: '#fff', fontSize: 15, outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box' }}
                                    onFocus={e => e.target.style.borderColor = 'rgba(255,255,255,.5)'}
                                    onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,.2)'}
                                />
                            </div>

                            {/* PIN */}
                            <div>
                                <label style={{ display: 'block', color: 'rgba(255,255,255,.7)', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: .8, marginBottom: 8 }}>PIN</label>
                                <div style={{ position: 'relative' }}>
                                    <input
                                        type={showPin ? 'text' : 'password'}
                                        value={pin}
                                        onChange={e => { if (e.target.value.length <= 4 && /^\d*$/.test(e.target.value)) { setPin(e.target.value); setError(''); } }}
                                        placeholder="4-digit PIN"
                                        maxLength={4}
                                        autoComplete="current-password"
                                        inputMode="numeric"
                                        style={{ width: '100%', padding: '13px 48px 13px 16px', background: 'rgba(255,255,255,.1)', border: '1.5px solid rgba(255,255,255,.2)', borderRadius: 12, color: '#fff', fontSize: 15, outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box', letterSpacing: pin && !showPin ? 6 : 1 }}
                                        onFocus={e => e.target.style.borderColor = 'rgba(255,255,255,.5)'}
                                        onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,.2)'}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                    />
                                    <button type="button" onClick={() => setShowPin(v => !v)}
                                        style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,.5)', fontSize: 18, padding: 4 }}>
                                        {showPin ? '🙈' : '👁️'}
                                    </button>
                                </div>
                            </div>

                            {/* Error */}
                            {error && (
                                <div style={{ background: 'rgba(239,68,68,.15)', border: '1px solid rgba(239,68,68,.3)', borderRadius: 10, padding: '10px 14px', color: '#fca5a5', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <span>⚠️</span> {error}
                                </div>
                            )}

                            {/* Submit */}
                            <button type="submit" disabled={loading}
                                style={{ padding: '14px', background: '#4f46e5', border: 'none', borderRadius: 12, color: '#fff', fontSize: 15, fontWeight: 800, cursor: 'pointer', fontFamily: 'inherit', transition: 'all .2s', boxShadow: '0 4px 14px rgba(79,70,229,.4)', marginTop: 4 }}>
                                {loading ? 'Signing in…' : 'Sign In →'}
                            </button>
                        </form>

                        {/* Hint */}
                        <div style={{ marginTop: 20, padding: '12px 14px', background: 'rgba(255,255,255,.05)', borderRadius: 12, border: '1px solid rgba(255,255,255,.1)' }}>
                            <p style={{ margin: '0 0 8px', color: 'rgba(255,255,255,.5)', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: .8 }}>Registered Users</p>
                            {USERS.map(u => (
                                <div key={u.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid rgba(255,255,255,.06)' }}>
                                    <span style={{ color: 'rgba(255,255,255,.7)', fontSize: 12 }}>{roleIcon(u.role)} <strong style={{ color: '#fff' }}>{u.username}</strong></span>
                                    <span style={{ color: 'rgba(255,255,255,.35)', fontSize: 11, fontFamily: 'monospace' }}>PIN: {u.pin}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <p style={{ textAlign: 'center', color: 'rgba(255,255,255,.2)', fontSize: 11, marginTop: 20 }}>© Smart Society MOM Portal · Secure</p>
                </div>
            );
        };

        const Badge = ({ status }) => {
            const cls = {
                'Draft': 'badge badge-draft', 'Under Review': 'badge badge-review',
                'Partially Signed': 'badge badge-partial', 'Fully Signed': 'badge badge-signed'
            }[status] || 'badge badge-draft';
            return <span className={cls}>{status}</span>;
        };

        /* ─────────────────────────── DASHBOARD ─────────────────────────── */
        const Dashboard = ({ moms, onMOM, onCreate }) => {
            const stats = [
                { label: 'Total MOMs', val: moms.length, icon: 'fileText', bg: '#eff6ff', col: '#2563eb' },
                { label: 'Pending Review', val: moms.filter(m => m.status === 'Under Review').length, icon: 'clock', bg: '#fffbeb', col: '#d97706' },
                { label: 'Fully Signed', val: moms.filter(m => m.status === 'Fully Signed').length, icon: 'checkCircle', bg: '#ecfdf5', col: '#059669' },
            ];
            return (
                <div className="fade">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                        <div>
                            <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Dashboard</h1>
                            <p style={{ margin: '4px 0 0', fontSize: 13, color: '#64748b' }}>{moms.length} total Meeting MOMs</p>
                        </div>
                        {onCreate && (
                            <button className="btn btn-primary" style={{ padding: '10px 16px', fontSize: 13 }} onClick={onCreate}>
                                <Icon n="plus" size={16} /> New MOM
                            </button>
                        )}
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 24 }}>
                        {stats.map(s => (
                            <div key={s.label} className="card" style={{ padding: '14px 10px', textAlign: 'center' }}>
                                <div style={{ width: 36, height: 36, borderRadius: 10, background: s.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 8px', color: s.col }}>
                                    <Icon n={s.icon} size={18} color={s.col} />
                                </div>
                                <div style={{ fontSize: 22, fontWeight: 700, lineHeight: 1 }}>{s.val}</div>
                                <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 4, lineHeight: 1.2 }}>{s.label}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                        <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>Recent Documents</h2>
                        <span style={{ fontSize: 12, color: '#4f46e5', fontWeight: 600 }}>View All</span>
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        {moms.map(m => (
                            <div key={m.id} className="card" style={{ padding: 16, cursor: 'pointer' }} onClick={() => onMOM(m)}>
                                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.title}</div>
                                        <div style={{ display: 'flex', gap: 12, fontSize: 12, color: '#94a3b8' }}>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: 3 }}><Icon n="calendar" size={12} /> {m.date}</span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: 3 }}><Icon n="users" size={12} /> {m.officeBearers.length} signatories</span>
                                        </div>
                                    </div>
                                    <Badge status={m.status} />
                                </div>
                                <div style={{ marginTop: 10, height: 4, borderRadius: 999, background: '#f1f5f9', overflow: 'hidden' }}>
                                    <div style={{ height: '100%', borderRadius: 999, background: '#4f46e5', width: `${(m.signatures.length / Math.max(m.officeBearers.length, 1)) * 100}%`, transition: 'width .4s' }} />
                                </div>
                                <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 4 }}>{m.signatures.length}/{m.officeBearers.length} signed</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── CREATE MOM ─────────────────────────── */
        const CreateMOM = ({ onBack, onSave, currentUser, editMOM }) => {
            const offBearers = USERS.filter(u => u.role !== 'Society Manager');
            const allIds = offBearers.map(u => u.id);
            const [f, setF] = React.useState(editMOM || { title: '', date: new Date().toISOString().split('T')[0], time: '18:00', agenda: '', content: '', officeBearers: allIds });
            const [saving, setSaving] = React.useState(false);
            const toggle = (key, val) => setF(p => ({ ...p, [key]: p[key].includes(val) ? p[key].filter(x => x !== val) : [...p[key], val] }));
            const allSelected = allIds.every(id => f.officeBearers.includes(id));
            const toggleAll = () => setF(p => ({ ...p, officeBearers: allSelected ? [] : allIds }));
            const save = status => {
                if (!f.title.trim()) { alert('Please enter a meeting title.'); return; }
                if (f.officeBearers.length === 0) { alert('Please select at least one office bearer to sign.'); return; }
                setSaving(true);
                const now = new Date().toISOString();
                const trail = editMOM
                    ? [...(editMOM.auditTrail||[]), { action: 'Edited', user: currentUser.name, ts: now }]
                    : [{ action: 'Created', user: currentUser.name, ts: now }];
                if (status === 'Under Review' && (!editMOM || editMOM.status === 'Draft')) {
                    trail.push({ action: 'Published', user: currentUser.name, ts: now });
                }
                setTimeout(() => {
                    onSave({ ...f, status, id: editMOM ? editMOM.id : 'm' + Date.now(), createdBy: 'u1', createdAt: editMOM ? editMOM.createdAt : now, signatures: editMOM ? editMOM.signatures : [], comments: editMOM ? editMOM.comments : [], auditTrail: trail });
                    setSaving(false);
                }, 800);
            };
            return (
                <div className="fade" style={{ paddingBottom: 100 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
                        <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, margin: -8, color: '#475569' }} onClick={onBack}><Icon n="arrowLeft" size={24} /></button>
                        <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>{editMOM ? 'Edit MOM' : 'New MOM'}</h1>
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                        <div><label className="label">Meeting Title *</label>
                            <input className="input-field" placeholder="e.g. Monthly Maintenance Meeting" value={f.title} onChange={e => setF({ ...f, title: e.target.value })} />
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                            <div><label className="label">Date</label>
                                <input className="input-field" type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })} />
                            </div>
                            <div><label className="label">Time</label>
                                <input className="input-field" type="time" value={f.time} onChange={e => setF({ ...f, time: e.target.value })} />
                            </div>
                        </div>

                        <div><label className="label">Agenda</label>
                            <textarea className="input-field" rows={3} placeholder="What will be discussed?" value={f.agenda} onChange={e => setF({ ...f, agenda: e.target.value })} style={{ resize: 'vertical' }} />
                        </div>

                        <div><label className="label">MOM Content</label>
                            <div style={{ border: '1.5px solid #e2e8f0', borderRadius: 12, overflow: 'hidden' }}>
                                <div style={{ display: 'flex', gap: 4, padding: '8px 10px', background: '#f8fafc', borderBottom: '1px solid #e2e8f0' }}>
                                    {['bold', 'list'].map(ic => <button key={ic} style={{ border: 'none', background: 'none', cursor: 'pointer', padding: '4px 6px', borderRadius: 6, color: '#475569' }}><Icon n={ic} size={16} /></button>)}
                                </div>
                                <textarea className="input-field" rows={6} placeholder="Type the minutes of the meeting here&#8230;" value={f.content} onChange={e => setF({ ...f, content: e.target.value })} style={{ border: 'none', borderRadius: 0, resize: 'vertical' }} />
                            </div>
                        </div>

                        <div>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                                <label className="label" style={{ margin: 0 }}>Office Bearers to Sign</label>
                                <button onClick={toggleAll}
                                    style={{ fontSize: 12, fontWeight: 700, color: allSelected ? '#ef4444' : '#4f46e5', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit' }}>
                                    {allSelected ? 'Deselect All' : 'Select All'}
                                </button>
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {offBearers.map(u => (
                                    <div key={u.id} className={`user-row${f.officeBearers.includes(u.id) ? ' selected' : ''}`} onClick={() => toggle('officeBearers', u.id)}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                            <div className="avatar" style={{ background: f.officeBearers.includes(u.id) ? '#c7d2fe' : '#e2e8f0', color: f.officeBearers.includes(u.id) ? '#4338ca' : '#475569' }}>{u.initials}</div>
                                            <div><div style={{ fontWeight: 700, fontSize: 14 }}>{u.name}</div><div style={{ fontSize: 12, color: '#94a3b8' }}>{u.role}</div></div>
                                        </div>
                                        <div style={{ width: 22, height: 22, borderRadius: '50%', border: `2px solid ${f.officeBearers.includes(u.id) ? '#4f46e5' : '#e2e8f0'}`, background: f.officeBearers.includes(u.id) ? '#4f46e5' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', flexShrink: 0 }}>
                                            {f.officeBearers.includes(u.id) && <Icon n="check" size={12} color="#fff" />}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: '#fff', borderTop: '1px solid #f1f5f9', padding: '12px 16px 20px', display: 'flex', gap: 10, maxWidth: 640, margin: '0 auto' }}>
                        <button className="btn btn-secondary" style={{ flex: 1, padding: '13px 0' }} onClick={() => save('Draft')} disabled={saving}>Save Draft</button>
                        <button className="btn btn-primary" style={{ flex: 1.5, padding: '13px 0' }} onClick={() => save('Under Review')} disabled={saving}>{saving ? 'Publishing&#8230;' : 'Publish for Review'}</button>
                    </div>
                </div>
            );
        };


        /* ─────────────────────────── MOM DETAIL ─────────────────────────── */
        const MOMDetail = ({ mom, onBack, onSign, onAddComment, onEdit, onPublish, currentUser }) => {
            const [comment, setComment] = React.useState('');

            const addComment = () => {
                if (!comment.trim()) return;
                onAddComment(mom.id, { id: 'c' + Date.now(), userId: currentUser.id, text: comment, ts: new Date().toISOString() });
                setComment('');
            };

            const isManager = currentUser.role === 'Society Manager';
            const isDraft = mom.status === 'Draft';
            const alreadySigned = mom.signatures.some(s => s.userId === currentUser.id);
            const fullySignedMOM = mom.status === 'Fully Signed';
            const isOfficeBearerForMOM = mom.officeBearers.includes(currentUser.id);
            const canSign = isOfficeBearerForMOM && !alreadySigned && !fullySignedMOM && !isDraft;

            return (
                <div className="fade" style={{ paddingBottom: 90 }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, margin: -8, color: '#475569' }} onClick={onBack}><Icon n="arrowLeft" size={24} /></button>
                        <Badge status={mom.status} />
                    </div>
                    <h1 style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.3, marginBottom: 4 }}>{mom.title}</h1>
                    <p style={{ margin: '0 0 16px', fontSize: 13, color: '#94a3b8' }}>Published {fmtDate(mom.createdAt)}</p>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                        <div className="card" style={{ padding: 14 }}>
                            <div style={{ fontSize: 10, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>Date &amp; Time</div>
                            <div style={{ fontSize: 13, fontWeight: 700 }}>{mom.date} {mom.time}</div>
                        </div>
                        <div className="card" style={{ padding: 14 }}>
                            <div style={{ fontSize: 10, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>Signatories</div>
                            <div style={{ fontSize: 13, fontWeight: 700 }}>{mom.officeBearers.length} members</div>
                        </div>
                    </div>

                    <div className="card" style={{ padding: 16, marginBottom: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Agenda</div>
                        <p style={{ margin: 0, fontStyle: 'italic', color: '#334155', lineHeight: 1.6 }}>"{mom.agenda}"</p>
                    </div>

                    <div className="card" style={{ padding: 16, marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>MOM Notes</div>
                        <p style={{ margin: 0, color: '#334155', lineHeight: 1.7, whiteSpace: 'pre-wrap' }}>{mom.content}</p>
                    </div>

                    {/* Signatures */}
                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Signatures</div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            {mom.officeBearers.map(uid => {
                                const u = userMap[uid];
                                const s = mom.signatures.find(x => x.userId === uid);
                                return (
                                    <div key={uid} className="card" style={{ padding: '14px 16px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: s ? 12 : 0 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                                <div style={{ width: 10, height: 10, borderRadius: '50%', background: s ? '#10b981' : '#e2e8f0', flexShrink: 0 }} />
                                                <div>
                                                    <div style={{ fontWeight: 700, fontSize: 13 }}>{u?.name}</div>
                                                    <div style={{ fontSize: 11, color: '#94a3b8' }}>{u?.role}</div>
                                                </div>
                                            </div>
                                            {s
                                                ? <div style={{ textAlign: 'right' }}>
                                                    <div style={{ fontSize: 10, fontWeight: 800, color: '#059669', textTransform: 'uppercase' }}>Signed ✓</div>
                                                    <div style={{ fontSize: 11, color: '#94a3b8' }}>{fmtDate(s.timestamp)}</div>
                                                </div>
                                                : <span style={{ fontSize: 11, color: '#f59e0b', fontWeight: 700, background: '#fffbeb', padding: '3px 10px', borderRadius: 999 }}>Pending</span>
                                            }
                                        </div>
                                        {/* Show actual signature if signed */}
                                        {s && (
                                            <div style={{ borderTop: '1px dashed #e2e8f0', paddingTop: 10, marginTop: 2 }}>
                                                {s.type === 'drawn' && s.data && s.data !== 'uploaded' ? (
                                                    <img src={s.data} alt="signature" style={{ maxHeight: 60, maxWidth: '100%', display: 'block', filter: 'contrast(1.2)' }} />
                                                ) : s.type === 'type' || (s.type === 'typed') ? (
                                                    <div style={{ fontFamily: 'Dancing Script,cursive', fontSize: 26, color: '#3730a3', lineHeight: 1.2 }}>{u?.name}</div>
                                                ) : s.type === 'upload' ? (
                                                    <div style={{ fontSize: 12, color: '#94a3b8', fontStyle: 'italic' }}>📤 Signature uploaded</div>
                                                ) : (
                                                    <div style={{ fontFamily: 'Dancing Script,cursive', fontSize: 26, color: '#3730a3', lineHeight: 1.2 }}>{u?.name}</div>
                                                )}
                                                <div style={{ fontSize: 10, color: '#94a3b8', marginTop: 4, textTransform: 'capitalize' }}>via {s.type} · {fmtDate(s.timestamp)}</div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Comments */}
                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Discussion ({mom.comments.length})</div>
                        {mom.comments.length === 0 && (
                            <div style={{ textAlign: 'center', padding: '16px 0', color: '#cbd5e1', fontSize: 13 }}>No comments yet. Be the first!</div>
                        )}
                        {mom.comments.map(c => {
                            const u = userMap[c.userId] || { name: 'Unknown', initials: '?' };
                            const isMe = c.userId === currentUser.id;
                            return (
                                <div key={c.id} style={{ display: 'flex', gap: 10, marginBottom: 12, flexDirection: isMe ? 'row-reverse' : 'row' }}>
                                    <div className="avatar" style={{ width: 32, height: 32, fontSize: 12, flexShrink: 0, background: userMap[c.userId]?.color || '#e2e8f0', color: '#fff' }}>{u.initials || u.name?.[0]}</div>
                                    <div style={{ flex: 1, maxWidth: '85%' }}>
                                        <div style={{ background: isMe ? '#eef2ff' : '#f8fafc', borderRadius: isMe ? '12px 12px 2px 12px' : '12px 12px 12px 2px', padding: '10px 14px' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, gap: 8 }}>
                                                <span style={{ fontSize: 12, fontWeight: 700, color: isMe ? '#4338ca' : '#334155' }}>{isMe ? 'You' : u.name}</span>
                                                <span style={{ fontSize: 10, color: '#94a3b8', whiteSpace: 'nowrap' }}>{fmtTime(c.ts)}</span>
                                            </div>
                                            <p style={{ margin: 0, fontSize: 13, color: '#334155' }}>{c.text}</p>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center', background: '#fff', border: '1.5px solid #e2e8f0', borderRadius: 14, padding: '8px 8px 8px 14px', marginTop: 8 }}>
                            <input style={{ flex: 1, border: 'none', outline: 'none', fontSize: 14, fontFamily: 'inherit', background: 'transparent' }} placeholder="Add a comment…" value={comment} onChange={e => setComment(e.target.value)} onKeyDown={e => e.key === 'Enter' && addComment()} />
                            <button onClick={addComment} style={{ width: 36, height: 36, borderRadius: 10, background: '#4f46e5', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', flexShrink: 0 }}><Icon n="send" size={16} color="#fff" /></button>
                        </div>
                    </div>

                    {/* Audit Trail */}
                    <div style={{ marginBottom: 10 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Audit Trail</div>
                        {mom.auditTrail.map((a, i) => (
                            <div key={i} className="timeline-item">
                                <div className="tl-dot"><Icon n="checkCircle" size={16} color="#4f46e5" /></div>
                                <div style={{ paddingTop: 6 }}>
                                    <div style={{ fontWeight: 700, fontSize: 13 }}>{a.action}</div>
                                    <div style={{ fontSize: 12, color: '#94a3b8' }}>{a.user} · {fmtDate(a.ts || a.timestamp)}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Bottom bar */}
                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: 'rgba(255,255,255,.95)', backdropFilter: 'blur(12px)', borderTop: '1px solid #f1f5f9', padding: '12px 16px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', maxWidth: 640, margin: '0 auto' }}>
                        <div>
                            <div style={{ fontSize: 12, color: '#94a3b8' }}>
                                {isDraft && isManager ? 'Draft — Not published yet' : fullySignedMOM ? 'All signatures collected' : isDraft ? 'Awaiting publication' : isOfficeBearerForMOM ? 'Action required' : 'Reviewing'}
                            </div>
                            <div style={{ fontSize: 14, fontWeight: 700 }}>
                                {isDraft && isManager ? '📝 Edit or Publish' : fullySignedMOM ? '✅ MOM Fully Signed' : alreadySigned ? 'You have signed this MOM' : isOfficeBearerForMOM && !isDraft ? 'Review & Sign MOM' : isDraft ? 'Awaiting Publication' : 'View Only'}
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                            {isDraft && isManager && (
                                <>
                                    <button className="btn btn-secondary" style={{ padding: '11px 16px' }} onClick={onEdit}>
                                        <Icon n="pen" size={15} color="#475569" /> Edit
                                    </button>
                                    <button className="btn btn-primary" style={{ padding: '11px 16px' }} onClick={onPublish}>
                                        <Icon n="send" size={15} color="#fff" /> Publish
                                    </button>
                                </>
                            )}
                            {!isDraft && isOfficeBearerForMOM && (
                                <button className={`btn ${canSign ? 'btn-primary' : 'btn-secondary'}`}
                                    style={{ padding: '11px 22px', opacity: canSign ? 1 : .6, cursor: canSign ? 'pointer' : 'not-allowed' }}
                                    onClick={canSign ? onSign : undefined}
                                    disabled={!canSign}>
                                    <Icon n="pen" size={16} color={canSign ? "#fff" : "#94a3b8"} />
                                    {' '}{alreadySigned || fullySignedMOM ? 'Signed ✓' : 'Sign Now'}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        /* ─────────────────────────── SIGNATURE PAD ─────────────────────────── */
        const SignaturePad = ({ onSign, onCancel, user }) => {
            const [mode, setMode] = React.useState('draw');
            const [typed, setTyped] = React.useState(user.name);
            const [drawing, setDrawing] = React.useState(false);
            const [hasSig, setHasSig] = React.useState(false);
            const canvasRef = React.useRef();

            React.useEffect(() => {
                if (mode === 'draw') {
                    // RAF to wait for modal slide-up animation so canvas has real offsetWidth
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const c = canvasRef.current;
                            if (!c) return;
                            const dpr = window.devicePixelRatio || 1;
                            c.width = c.offsetWidth * dpr;
                            c.height = c.offsetHeight * dpr;
                            const ctx = c.getContext('2d');
                            ctx.scale(dpr, dpr);
                            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                        });
                    });
                }
            }, [mode]);

            const getPos = e => {
                const r = canvasRef.current.getBoundingClientRect();
                const src = e.touches ? e.touches[0] : e;
                return { x: src.clientX - r.left, y: src.clientY - r.top };
            };
            const startDraw = e => { const { x, y } = getPos(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); setDrawing(true); };
            const moveDraw = e => { if (!drawing) return; const { x, y } = getPos(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); setHasSig(true); };
            const endDraw = () => setDrawing(false);
            const clear = () => { const c = canvasRef.current, ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height); setHasSig(false); };

            const confirm = () => {
                let data = '';
                if (mode === 'draw') data = canvasRef.current.toDataURL();
                else if (mode === 'type') data = typed;
                else data = 'uploaded';
                onSign({ type: mode, data, timestamp: new Date().toISOString(), userName: user.name, userRole: user.role });
            };

            const canConfirm = (mode === 'draw' && hasSig) || (mode === 'type' && typed.trim()) || (mode === 'upload');

            return (
                <div style={{ padding: '0 20px 20px' }}>
                    <div className="sig-tab-bar" style={{ marginBottom: 20 }}>
                        {['draw', 'type', 'upload'].map(m => <button key={m} className={`sig-tab${mode === m ? ' active' : ''}`} onClick={() => { setMode(m); setHasSig(false); }}>{m === 'draw' ? '✍️ Draw' : m === 'type' ? 'T Type' : '⬆️ Upload'}</button>)}
                    </div>

                    {mode === 'draw' && (
                        <div style={{ position: 'relative', background: '#f8fafc', borderRadius: 16, border: '2px dashed #e2e8f0', overflow: 'hidden', marginBottom: 12 }}>
                            <canvas ref={canvasRef} style={{ display: 'block', width: '100%', height: 180, cursor: 'crosshair' }}
                                onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
                                onTouchStart={e => { e.preventDefault(); startDraw(e); }} onTouchMove={e => { e.preventDefault(); moveDraw(e); }} onTouchEnd={endDraw} />
                            {!hasSig && <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#cbd5e1', fontSize: 14, pointerEvents: 'none' }}>Sign here with your finger or mouse</div>}
                            {hasSig && <button onClick={clear} style={{ position: 'absolute', top: 8, right: 8, background: 'rgba(255,255,255,.9)', border: '1px solid #e2e8f0', borderRadius: 8, padding: '4px 10px', cursor: 'pointer', fontSize: 12, color: '#ef4444', display: 'flex', alignItems: 'center', gap: 4 }}><Icon n="refresh" size={14} color="#ef4444" />Clear</button>}
                        </div>
                    )}

                    {mode === 'type' && (
                        <div style={{ marginBottom: 12 }}>
                            <input className="input-field" style={{ textAlign: 'center', fontFamily: 'Dancing Script,cursive', fontSize: 28, color: '#3730a3', padding: '16px' }} value={typed} onChange={e => setTyped(e.target.value)} placeholder="Type your name…" />
                            <p style={{ textAlign: 'center', fontSize: 11, color: '#94a3b8', marginTop: 8 }}>This will appear as your digital signature</p>
                        </div>
                    )}

                    {mode === 'upload' && (
                        <label style={{ display: 'block', background: '#f8fafc', border: '2px dashed #e2e8f0', borderRadius: 16, padding: 32, textAlign: 'center', cursor: 'pointer', marginBottom: 12 }}>
                            <Icon n="upload" size={36} color="#94a3b8" />
                            <p style={{ margin: '10px 0 4px', fontWeight: 700, color: '#334155' }}>Tap to upload signature</p>
                            <p style={{ margin: 0, fontSize: 12, color: '#94a3b8' }}>PNG or JPG, max 5MB</p>
                            <input type="file" accept="image/*" style={{ display: 'none' }} />
                        </label>
                    )}

                    <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 12, padding: '10px 14px', marginBottom: 16, display: 'flex', gap: 10 }}>
                        <Icon n="shield2" size={18} color="#d97706" />
                        <p style={{ margin: 0, fontSize: 11, color: '#92400e', lineHeight: 1.6 }}>By confirming, I agree that this constitutes my legally binding electronic signature on the Society MOM.</p>
                    </div>

                    <div style={{ display: 'flex', gap: 10 }}>
                        <button className="btn btn-secondary" style={{ flex: 1, padding: '13px 0' }} onClick={onCancel}>Cancel</button>
                        <button className="btn btn-primary" style={{ flex: 1, padding: '13px 0' }} onClick={confirm} disabled={!canConfirm}>Confirm Signature</button>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── NOTIFICATIONS ─────────────────────────── */
        const NotifPanel = ({ onClose }) => (
            <div style={{ position: 'fixed', inset: 0, zIndex: 300 }} onClick={onClose}>
                <div style={{ position: 'absolute', top: 58, right: 12, width: 290, background: '#fff', borderRadius: 16, boxShadow: '0 8px 32px rgba(0,0,0,.15)', border: '1px solid #f1f5f9', overflow: 'hidden' }} onClick={e => e.stopPropagation()}>
                    <div style={{ padding: '14px 16px', fontWeight: 700, fontSize: 14, borderBottom: '1px solid #f8fafc' }}>Notifications</div>
                    {NOTIFICATIONS.map(n => (
                        <div key={n.id} style={{ display: 'flex', gap: 12, padding: '12px 16px', background: n.read ? '#fff' : '#f5f7ff', borderBottom: '1px solid #f8fafc' }}>
                            <div style={{ width: 32, height: 32, borderRadius: 10, background: n.read ? '#f1f5f9' : '#eef2ff', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                <Icon n="info" size={16} color={n.read ? '#94a3b8' : '#4f46e5'} />
                            </div>
                            <div><p style={{ margin: '0 0 3px', fontSize: 12, color: '#334155', lineHeight: 1.4 }}>{n.text}</p><p style={{ margin: 0, fontSize: 11, color: '#94a3b8' }}>{n.time}</p></div>
                        </div>
                    ))}
                </div>
            </div>
        );

        /* ─────────────────────────── MODAL ─────────────────────────── */
        const Modal = ({ title, children, onClose }) => (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-box" onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                        <span style={{ fontSize: 16, fontWeight: 700 }}>{title}</span>
                        <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#94a3b8' }} onClick={onClose}><Icon n="x" size={22} /></button>
                    </div>
                    <div style={{ padding: '16px 0' }}>{children}</div>
                </div>
            </div>
        );

        /* ─────────────────────────── MOMS LIST VIEW ─────────────────────────── */
        const MOMsView = ({ moms, onMOM }) => {
            const [filter, setFilter] = React.useState('All');
            const statuses = ['All', 'Draft', 'Under Review', 'Partially Signed', 'Fully Signed'];
            const filtered = filter === 'All' ? moms : moms.filter(m => m.status === filter);
            return (
                <div className="fade">
                    <h1 style={{ margin: '0 0 4px', fontSize: 22, fontWeight: 700 }}>All MOMs</h1>
                    <p style={{ margin: '0 0 16px', fontSize: 13, color: '#64748b' }}>{moms.length} total documents</p>

                    {/* Filter pills */}
                    <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 8, marginBottom: 16, scrollbarWidth: 'none' }}>
                        {statuses.map(s => (
                            <button key={s} onClick={() => setFilter(s)}
                                style={{
                                    flexShrink: 0, padding: '6px 14px', borderRadius: 999, border: '1.5px solid', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                                    background: filter === s ? '#4f46e5' : '#fff',
                                    color: filter === s ? '#fff' : '#64748b',
                                    borderColor: filter === s ? '#4f46e5' : '#e2e8f0'
                                }}>
                                {s}
                            </button>
                        ))}
                    </div>

                    {filtered.length === 0 && (
                        <div style={{ textAlign: 'center', padding: '48px 0', color: '#94a3b8' }}>
                            <div style={{ fontSize: 40, marginBottom: 8 }}>📄</div>
                            <p style={{ margin: 0, fontWeight: 600 }}>No MOMs found</p>
                            <p style={{ margin: '4px 0 0', fontSize: 13 }}>Try a different filter</p>
                        </div>
                    )}

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        {filtered.map(m => {
                            const sigPct = m.officeBearers.length ? Math.round((m.signatures.length / m.officeBearers.length) * 100) : 0;
                            return (
                                <div key={m.id} className="card" style={{ padding: 16, cursor: 'pointer' }} onClick={() => onMOM(m)}>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8, marginBottom: 10 }}>
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{m.title}</div>
                                            <div style={{ fontSize: 12, color: '#94a3b8', display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                                                <span>📅 {m.date} {m.time}</span>
                                            </div>
                                        </div>
                                        <Badge status={m.status} />
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                        <div style={{ flex: 1, height: 4, borderRadius: 999, background: '#f1f5f9', overflow: 'hidden' }}>
                                            <div style={{ height: '100%', borderRadius: 999, background: m.status === 'Fully Signed' ? '#10b981' : m.status === 'Partially Signed' ? '#4f46e5' : '#f59e0b', width: sigPct + '%', transition: 'width .4s' }} />
                                        </div>
                                        <span style={{ fontSize: 11, color: '#94a3b8', whiteSpace: 'nowrap' }}>{m.signatures.length}/{m.officeBearers.length} signed</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── AUDIT TRAIL VIEW ─────────────────────────── */
        const AuditView = ({ moms }) => {
            // Flatten all audit entries across all MOMs
            const allEvents = moms.flatMap(m =>
                (m.auditTrail || []).map(a => ({
                    ...a,
                    momTitle: m.title,
                    momId: m.id,
                    status: m.status,
                }))
            ).sort((a, b) => new Date(b.ts || b.timestamp) - new Date(a.ts || a.timestamp));

            const actionColor = a => ({
                'Created': '#64748b', 'Published': '#d97706', 'Reviewed': '#2563eb',
                'Signed': '#059669', 'Edited': '#7c3aed'
            }[a] || '#64748b');

            const actionIcon = a => ({
                'Created': '📝', 'Published': '📢', 'Reviewed': '👁️', 'Signed': '✅', 'Edited': '✏️'
            }[a] || '📋');

            return (
                <div className="fade">
                    <h1 style={{ margin: '0 0 4px', fontSize: 22, fontWeight: 700 }}>Audit Trail</h1>
                    <p style={{ margin: '0 0 20px', fontSize: 13, color: '#64748b' }}>{allEvents.length} total events across all MOMs</p>

                    {allEvents.length === 0 && (
                        <div style={{ textAlign: 'center', padding: '48px 0', color: '#94a3b8' }}>
                            <div style={{ fontSize: 40, marginBottom: 8 }}>🔍</div>
                            <p style={{ margin: 0, fontWeight: 600 }}>No audit events yet</p>
                        </div>
                    )}

                    <div style={{ position: 'relative' }}>
                        {allEvents.length > 0 && <div style={{ position: 'absolute', left: 16, top: 0, bottom: 0, width: 2, background: '#f1f5f9', zIndex: 0 }} />}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
                            {allEvents.map((a, i) => (
                                <div key={i} style={{ display: 'flex', gap: 14, paddingBottom: 20, position: 'relative', zIndex: 1 }}>
                                    <div style={{ width: 34, height: 34, borderRadius: '50%', background: '#fff', border: '2px solid #e2e8f0', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 16 }}>
                                        {actionIcon(a.action)}
                                    </div>
                                    <div className="card" style={{ flex: 1, padding: '12px 14px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
                                            <span style={{ fontWeight: 700, fontSize: 13, color: actionColor(a.action) }}>{a.action}</span>
                                            <span style={{ fontSize: 10, color: '#94a3b8' }}>{fmtDate(a.ts || a.timestamp)}</span>
                                        </div>
                                        <div style={{ fontSize: 13, color: '#334155', marginBottom: 4 }}>{a.user}</div>
                                        <div style={{ fontSize: 11, color: '#94a3b8', background: '#f8fafc', borderRadius: 6, padding: '4px 8px', display: 'inline-block' }}>{a.momTitle}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── APP ─────────────────────────── */
        const App = () => {
            const [currentUser, setCurrentUser] = React.useState(null);
            const [view, setView] = React.useState('tab');
