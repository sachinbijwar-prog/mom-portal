<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Smart MOM – Society Meeting Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@600&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #111111;
            color: #f8fafc;
            overscroll-behavior: none
        }

        #root {
            min-height: 100vh
        }

        .sig-font {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #3730a3
        }

        canvas {
            touch-action: none
        }

        .fade {
            animation: fadeIn .25s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        textarea,
        input {
            font-family: 'Inter', sans-serif
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .3px
        }

        .badge-draft {
            background: #262626;
            color: #94a3b8
        }

        .badge-review {
            background: rgba(212, 175, 55, 0.15);
            color: #D4AF37
        }

        .badge-partial {
            background: rgba(14, 165, 233, 0.15);
            color: #0ea5e9
        }

        .badge-signed {
            background: rgba(16, 185, 129, 0.15);
            color: #10B981
        }

        .card {
            background: #1A1A1A;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
            color: #f8fafc
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border-radius: 12px;
            transition: all .15s;
            active: transform:scale(.97)
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn-primary {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #000;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3)
        }

        .btn-primary:hover {
            background: #B8860B;
            transform: translateY(-1px)
        }

        .btn-secondary {
            background: #262626;
            color: #fff;
            border: 1px solid #f1f5f9
        }

        .btn-secondary:hover {
            background: #333333
        }

        .btn-danger {
            background: #ef4444;
            color: #fff
        }

        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17, 17, 17, .98);
            backdrop-filter: blur(12px);
            border-top: 1px solid #334155;
            display: flex;
            z-index: 100;
            padding: 8px 0 env(safe-area-inset-bottom)
        }

        .tabbar button {
            flex: 1;
            border: none;
            background: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: #94a3b8;
            padding: 4px 0;
            font-family: 'Inter', sans-serif
        }

        .tabbar button.active {
            color: #D4AF37
        }

        .tabbar svg {
            width: 20px;
            height: 20px;
            stroke-width: 2
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(17, 17, 17, .95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #334155;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .page {
            padding: 16px 16px 90px;
            max-width: 640px;
            margin: 0 auto
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: #1A1A1A;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
            color: #f8fafc
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(212, 175, 55, 0.1) !important
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .4);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center
        }

        .modal-box {
            background: #1A1A1A;
            width: 100%;
            max-width: 640px;
            border-radius: 24px 24px 0 0;
            padding: 0 0 env(safe-area-inset-bottom);
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp .25s ease;
            color: #f8fafc;
            border: 1px solid #334155;
            border-bottom: none
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: none
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            background: #1A1A1A;
            z-index: 1
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #334155;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border .15s;
            background: #262626;
            color: #fff;
            font-family: inherit
        }

        .input-field:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
            display: block
        }

        .comment-bubble {
            background: #f8fafc;
            border-radius: 12px 12px 12px 2px;
            padding: 10px 14px
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            border: 1.5px solid #334155;
            background: #1A1A1A;
            color: #f8fafc
        }

        .chip.selected {
            background: #D4AF37;
            color: #fff;
            border-color: #D4AF37;
            box-shadow: 0 2px 8px rgba(79, 70, 229, .3)
        }

        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            border-radius: 14px;
            border: 1.5px solid #334155;
            cursor: pointer;
            transition: all .15s;
            background: #1A1A1A;
            margin-bottom: 8px;
            color: #f8fafc
        }

        .user-row.selected {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1)
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            background: #334155;
            color: #cbd5e1;
            flex-shrink: 0
        }

        .sig-tab-bar {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            gap: 4px
        }

        .sig-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all .2s;
            font-family: inherit
        }

        .sig-tab.active {
            background: #262626;
            color: #D4AF37;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .3)
        }

        .timeline-item {
            display: flex;
            gap: 12px;
            padding-bottom: 16px;
            position: relative
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 17px;
            top: 34px;
            bottom: 0;
            width: 1px;
            background: #334155
        }

        .timeline-item:last-child::before {
            display: none
        }

        .tl-dot {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #D4AF37
        }

        svg.icon {
            display: inline-block;
            vertical-align: middle
        }
    </style>
</head>

                    setTimeout(() => {
                        if (step === 'current') {
                            if (next !== user.pin) { doError('Incorrect current PIN'); }
                            else { setError(''); setStep('new'); }
                        } else if (step === 'new') {
                            if (next === user.pin) { doError('New PIN must be different from current PIN'); }
                            else { setError(''); setStep('confirm'); }
                        } else {
                            if (next !== newPin) { doError('PINs do not match. Try again.'); setStep('new'); setNewPin(''); }
                            else {
                                // Save new PIN
                                user.pin = newPin;
                                localStorage.setItem('pin_' + user.id, newPin);
                                setSuccess(true);
                                setTimeout(() => { onChanged(); onClose(); }, 1400);
                            }
                        }
                    }, 200);
                }
            };

            const stepInfo = {
                current: { label: 'Enter your current PIN', emoji: '🔒' },
                new: { label: 'Enter your new 4-digit PIN', emoji: '✨' },
                confirm: { label: 'Confirm your new PIN', emoji: '✅' },
            }[step];

            return (
                <div className="modal-overlay">
                    <div className="modal-box" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <span style={{ fontSize: 16, fontWeight: 700 }}>Change PIN</span>
                            <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#94a3b8' }} onClick={onClose}>
                                <Icon n="x" size={22} />
                            </button>
                        </div>
                        <div style={{ padding: '24px 20px' }}>
                            {success ? (
                                <div style={{ textAlign: 'center', padding: '24px 0' }}>
                                    <div style={{ fontSize: 56, marginBottom: 12 }}>✅</div>
                                    <div style={{ fontWeight: 800, fontSize: 18, color: '#059669' }}>PIN Changed!</div>
                                    <p style={{ color: '#94a3b8', fontSize: 13, marginTop: 6 }}>Your new PIN has been saved securely.</p>
                                </div>
                            ) : (
                                <>
                                    {/* Step indicator */}
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 20 }}>
                                        {['current', 'new', 'confirm'].map((s, i) => (
                                            <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                <div style={{
                                                    width: 28, height: 28, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 12,
                                                    background: step === s ? '#D4AF37' : ['current', 'new', 'confirm'].indexOf(step) > i ? '#10b981' : '#f1f5f9',
                                                    color: step === s || ['current', 'new', 'confirm'].indexOf(step) > i ? '#fff' : '#94a3b8'
                                                }}>
                                                    {['current', 'new', 'confirm'].indexOf(step) > i ? '✓' : (i + 1)}
                                                </div>
                                                {i < 2 && <div style={{ width: 20, height: 2, background: ['current', 'new', 'confirm'].indexOf(step) > i ? '#10b981' : '#f1f5f9', borderRadius: 2 }} />}
                                            </div>
                                        ))}
                                    </div>

                                    <div style={{ textAlign: 'center', marginBottom: 20 }}>
                                        <div style={{ fontSize: 32, marginBottom: 8 }}>{stepInfo.emoji}</div>
                                        <p style={{ margin: 0, fontWeight: 700, color: '#f1f5f9' }}>{stepInfo.label}</p>
                                    </div>

                                    {/* PIN dots */}
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: 14, marginBottom: 8 }}>
                                        {[0, 1, 2, 3].map(i => (
                                            <div key={i} style={{ width: 14, height: 14, borderRadius: '50%', border: '2px solid #334155', background: activePin.length > i ? '#D4AF37' : 'transparent', transition: 'background .15s' }} />
                                        ))}
                                    </div>
                                    {error && <p style={{ color: '#ef4444', fontSize: 12, textAlign: 'center', marginBottom: 8 }}>{error}</p>}
                                    <p style={{ color: '#94a3b8', fontSize: 11, textAlign: 'center', marginBottom: 20 }}>Enter 4 digits</p>

                                    {/* Numpad */}
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
                                        {digits.map((d, i) => d === '' ? <div key={i} /> : (
                                            <button key={i} onClick={() => pressDigit(d)}
                                                style={{
                                                    padding: '16px 0', background: d === '⌫' ? '#fff5f5' : '#f8fafc', border: '1.5px solid',
                                                    borderColor: d === '⌫' ? '#fecaca' : '#334155',
                                                    borderRadius: 12, color: d === '⌫' ? '#ef4444' : '#f1f5f9',
                                                    fontSize: 18, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', transition: 'all .1s'
                                                }}>
                                                {d}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── LOGIN SCREEN ─────────────────────────── */
        const LoginScreen = ({ onLogin, users }) => {
            const [username, setUsername] = React.useState('');
            const [pin, setPin] = React.useState('');
            const [showPin, setShowPin] = React.useState(false);
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleLogin = e => {
                e && e.preventDefault();
                if (!username.trim() || !pin.trim()) { setError('Please enter username and PIN.'); return; }
                setLoading(true);
                setTimeout(() => {
                    const user = users.find(u => u.username.toLowerCase() === username.trim().toLowerCase());
                    if (!user) { setError('Username not found.'); setLoading(false); return; }
                    if (pin !== user.pin) { setError('Incorrect PIN. Please try again.'); setPin(''); setLoading(false); return; }
                    setError('');
                    onLogin(user);
                }, 600);
            };

            const roleIcon = r => ({ 'Society Manager': '🏢', 'Chairman': '👑', 'Secretary': '📋', 'Treasurer': '💰' }[r] || '👤');

            return (
                <div style={{
                    minHeight: '100vh',
                    background: 'url("arv_royale_top_view.png") center/cover no-repeat',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '24px 20px',
                    position: 'relative'
                }}>
                    <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 100%)', zIndex: 0 }} />

                    {/* Logo */}
                    <div style={{ textAlign: 'center', marginBottom: 36, position: 'relative', zIndex: 1 }}>
                        <div style={{ width: 100, height: 100, background: '#D4AF37', borderRadius: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', boxShadow: '0 10px 20px rgba(212, 175, 55, 0.3)', overflow: 'hidden', position: 'relative' }}>
                            <img src="arv_royale_logo.png" style={{ width: '85%', height: '85%', objectFit: 'contain', position: 'absolute', zIndex: 2 }} alt="" onError={e => e.target.style.display = 'none'} />
                            <div style={{ fontSize: 48, position: 'absolute', zIndex: 1 }}>👑</div>
                        </div>
                        <h1 style={{ margin: 0, color: '#fff', fontSize: 32, fontWeight: 900, letterSpacing: -1 }}>ARV ROYALE</h1>
                        <p style={{ margin: '4px 0 0', color: '#D4AF37', fontSize: 13, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 2 }}>Digital Signature Portal</p>
                    </div>

                    {/* Form Card */}
                    <div style={{ width: '100%', maxWidth: 380, background: 'rgba(38, 38, 38, .8)', backdropFilter: 'blur(24px)', borderRadius: 24, border: '1.5px solid rgba(255,255,255,.08)', padding: 32, boxShadow: '0 20px 40px rgba(0,0,0,.5)', position: 'relative', zIndex: 1 }}>
                        <h2 style={{ margin: '0 0 24px', color: '#fff', fontSize: 20, fontWeight: 700 }}>Sign In</h2>

                        <form onSubmit={handleLogin} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                            {/* Username */}
                            <div>
                                <label style={{ display: 'block', color: 'rgba(255,255,255,.7)', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: .8, marginBottom: 8 }}>Username</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={e => { setUsername(e.target.value); setError(''); }}
                                    placeholder="e.g. sachin"
                                    autoComplete="username"
                                    style={{ width: '100%', padding: '13px 16px', background: 'rgba(255,255,255,.1)', border: '1.5px solid rgba(255,255,255,.2)', borderRadius: 12, color: '#fff', fontSize: 15, outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box' }}
                                    onFocus={e => e.target.style.borderColor = 'rgba(255,255,255,.5)'}
                                    onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,.2)'}
                                />
                            </div>

                            {/* PIN */}
                            <div>
                                <label style={{ display: 'block', color: 'rgba(255,255,255,.7)', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: .8, marginBottom: 8 }}>PIN</label>
                                <div style={{ position: 'relative' }}>
                                    <input
                                        type={showPin ? 'text' : 'password'}
                                        value={pin}
                                        onChange={e => { if (e.target.value.length <= 4 && /^\d*$/.test(e.target.value)) { setPin(e.target.value); setError(''); } }}
                                        placeholder="4-digit PIN"
                                        maxLength={4}
                                        autoComplete="current-password"
                                        inputMode="numeric"
                                        style={{ width: '100%', padding: '13px 48px 13px 16px', background: 'rgba(255,255,255,.1)', border: '1.5px solid rgba(255,255,255,.2)', borderRadius: 12, color: '#fff', fontSize: 15, outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box', letterSpacing: pin && !showPin ? 6 : 1 }}
                                        onFocus={e => e.target.style.borderColor = 'rgba(255,255,255,.5)'}
                                        onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,.2)'}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                    />
                                    <button type="button" onClick={() => setShowPin(v => !v)}
                                        style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,.5)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <Icon n={showPin ? 'eyeOff' : 'eye'} size={20} />
                                    </button>
                                </div>
                            </div>

                            {/* Error */}
                            {error && (
                                <div style={{ background: 'rgba(239,68,68,.15)', border: '1px solid rgba(239,68,68,.3)', borderRadius: 10, padding: '10px 14px', color: '#fca5a5', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <span>⚠️</span> {error}
                                </div>
                            )}

                            {/* Submit */}
                            <button type="submit" disabled={loading}
                                style={{ padding: '14px', background: 'linear-gradient(135deg, #D4AF37, #B8860B)', border: 'none', borderRadius: 12, color: '#000', fontSize: 15, fontWeight: 800, cursor: 'pointer', fontFamily: 'inherit', transition: 'all .2s', boxShadow: '0 4px 14px rgba(212, 175, 55, 0.3)', marginTop: 4 }}>
                                {loading ? 'Signing in…' : 'Sign In →'}
                            </button>
                        </form>

                        {/* Hint */}
                        <div style={{ marginTop: 20, padding: '12px 14px', background: 'rgba(255,255,255,.05)', borderRadius: 12, border: '1px solid rgba(255,255,255,.1)' }}>
                            <p style={{ margin: '0 0 8px', color: 'rgba(255,255,255,.5)', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: .8 }}>Registered Users</p>
                            {users.map(u => (
                                <div key={u.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid rgba(255,255,255,.06)' }}>
                                    <span style={{ color: 'rgba(255,255,255,.7)', fontSize: 12 }}>{roleIcon(u.role)} <strong style={{ color: '#fff' }}>{u.username}</strong></span>
                                    <span style={{ color: 'rgba(255,255,255,.35)', fontSize: 11, fontFamily: 'monospace' }}>PIN: {u.pin}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <p style={{ textAlign: 'center', color: 'rgba(255,255,255,.2)', fontSize: 11, marginTop: 20 }}>© Smart Society MOM Portal · Secure</p>
                </div>
            );
        };

        const Badge = ({ status }) => {
            const cls = {
                'Draft': 'badge badge-draft', 'Under Review': 'badge badge-review',
                'Partially Signed': 'badge badge-partial', 'Fully Signed': 'badge badge-signed'
            }[status] || 'badge badge-draft';
            return <span className={cls}>{status}</span>;
        };

        /* ─────────────────────────── DASHBOARD ─────────────────────────── */
        const Dashboard = ({ moms, onMOM, onCreate }) => {
            const stats = [
                { label: 'Total MOMs', val: moms.length, icon: 'fileText', bg: 'rgba(212, 175, 55, 0.1)', col: '#D4AF37' },
                { label: 'Pending Review', val: moms.filter(m => m.status === 'Under Review').length, icon: 'clock', bg: 'rgba(245, 158, 11, 0.1)', col: '#f59e0b' },
                { label: 'Fully Signed', val: moms.filter(m => m.status === 'Fully Signed').length, icon: 'checkCircle', bg: 'rgba(16, 185, 129, 0.1)', col: '#10b981' },
            ];
            return (
                <div className="fade">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                        <div>
                            <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Dashboard</h1>
                            <p style={{ margin: '4px 0 0', fontSize: 13, color: '#64748b' }}>{moms.length} total Meeting MOMs</p>
                        </div>
                        {onCreate && (
                            <button className="btn btn-primary" style={{ padding: '10px 16px', fontSize: 13 }} onClick={onCreate}>
                                <Icon n="plus" size={16} /> New MOM
                            </button>
                        )}
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 24 }}>
                        {stats.map(s => (
                            <div key={s.label} className="card" style={{ padding: '14px 10px', textAlign: 'center' }}>
                                <div style={{ width: 36, height: 36, borderRadius: 10, background: s.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 8px', color: s.col }}>
                                    <Icon n={s.icon} size={18} color={s.col} />
                                </div>
                                <div style={{ fontSize: 22, fontWeight: 700, lineHeight: 1 }}>{s.val}</div>
                                <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 4, lineHeight: 1.2 }}>{s.label}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                        <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>Recent Documents</h2>
                        <span style={{ fontSize: 12, color: '#D4AF37', fontWeight: 600 }}>View All</span>
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        {moms.map(m => (
                            <div key={m.id} className="card" style={{ padding: 16, cursor: 'pointer' }} onClick={() => onMOM(m)}>
                                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.title}</div>
                                        <div style={{ display: 'flex', gap: 12, fontSize: 12, color: '#94a3b8' }}>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: 3 }}><Icon n="calendar" size={12} /> {m.date}</span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: 3 }}><Icon n="users" size={12} /> {m.officeBearers.length} signatories</span>
                                        </div>
                                    </div>
                                    <Badge status={m.status} />
                                </div>
                                <div style={{ marginTop: 10, height: 4, borderRadius: 999, background: '#f1f5f9', overflow: 'hidden' }}>
                                    <div style={{ height: '100%', borderRadius: 999, background: '#D4AF37', width: `${(m.signatures.length / Math.max(m.officeBearers.length, 1)) * 100}%`, transition: 'width .4s' }} />
                                </div>
                                <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 4 }}>{m.signatures.length}/{m.officeBearers.length} signed</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── CREATE MOM ─────────────────────────── */
        const CreateMOM = ({ onBack, onSave, currentUser, editMOM, users }) => {
            const offBearers = users.filter(u => u.role !== 'Society Manager');
            const allIds = offBearers.map(u => u.id);
            const [f, setF] = React.useState(editMOM || { title: '', date: new Date().toISOString().split('T')[0], time: '18:00', agenda: '', content: '', officeBearers: allIds });
            const [saving, setSaving] = React.useState(false);
            const toggle = (key, val) => setF(p => ({ ...p, [key]: p[key].includes(val) ? p[key].filter(x => x !== val) : [...p[key], val] }));
            const allSelected = allIds.every(id => f.officeBearers.includes(id));
            const toggleAll = () => setF(p => ({ ...p, officeBearers: allSelected ? [] : allIds }));
            const save = status => {
                if (!f.title.trim()) { alert('Please enter a meeting title.'); return; }
                if (f.officeBearers.length === 0) { alert('Please select at least one office bearer to sign.'); return; }
                setSaving(true);
                const now = new Date().toISOString();
                const trail = editMOM
                    ? [...(editMOM.auditTrail || []), { action: 'Edited', user: currentUser.name, ts: now }]
                    : [{ action: 'Created', user: currentUser.name, ts: now }];
                if (status === 'Under Review' && (!editMOM || editMOM.status === 'Draft')) {
                    trail.push({ action: 'Published', user: currentUser.name, ts: now });
                }
                setTimeout(async () => {
                    try {
                        const momData = {
                            ...f,
                            status,
                            id: editMOM ? editMOM.id : 'm' + Date.now(),
                            createdBy: currentUser.id,
                            createdAt: editMOM ? editMOM.createdAt : now,
                            signatures: editMOM ? editMOM.signatures : [],
                            comments: editMOM ? editMOM.comments : [],
                            auditTrail: trail
                        };
                        await onSave(momData);
                    } catch (err) {
                        console.error("Save Error:", err);
                        alert("Failed to save MOM: " + err.message);
                    } finally {
                        setSaving(false);
                    }
                }, 400);
            };
            return (
                <div className="fade" style={{ paddingBottom: 100 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
                        <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, margin: -8, color: '#cbd5e1' }} onClick={onBack}><Icon n="arrowLeft" size={24} /></button>
                        <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>{editMOM ? 'Edit MOM' : 'New MOM'}</h1>
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                        <div><label className="label">Meeting Title *</label>
                            <input className="input-field" placeholder="e.g. Monthly Maintenance Meeting" value={f.title} onChange={e => setF({ ...f, title: e.target.value })} />
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                            <div><label className="label">Date</label>
                                <input className="input-field" type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })} />
                            </div>
                            <div><label className="label">Time</label>
                                <input className="input-field" type="time" value={f.time} onChange={e => setF({ ...f, time: e.target.value })} />
                            </div>
                        </div>

                        <div><label className="label">Agenda</label>
                            <textarea className="input-field" rows={3} placeholder="What will be discussed?" value={f.agenda} onChange={e => setF({ ...f, agenda: e.target.value })} style={{ resize: 'vertical' }} />
                        </div>

                        <div><label className="label">MOM Content</label>
                            <div style={{ border: '1.5px solid #334155', borderRadius: 12, overflow: 'hidden' }}>
                                <div style={{ display: 'flex', gap: 4, padding: '8px 10px', background: '#262626', borderBottom: '1px solid #334155' }}>
                                    {['bold', 'list'].map(ic => <button key={ic} style={{ border: 'none', background: 'none', cursor: 'pointer', padding: '4px 6px', borderRadius: 6, color: '#cbd5e1' }}><Icon n={ic} size={16} /></button>)}
                                </div>
                                <textarea className="input-field" rows={6} placeholder="Type the minutes of the meeting here&#8230;" value={f.content} onChange={e => setF({ ...f, content: e.target.value })} style={{ border: 'none', borderRadius: 0, resize: 'vertical' }} />
                            </div>
                        </div>

                        <div>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                                <label className="label" style={{ margin: 0 }}>Office Bearers to Sign</label>
                                <button onClick={toggleAll}
                                    style={{ fontSize: 12, fontWeight: 700, color: allSelected ? '#ef4444' : '#D4AF37', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit' }}>
                                    {allSelected ? 'Deselect All' : 'Select All'}
                                </button>
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {offBearers.map(u => (
                                    <div key={u.id} className={`user-row${f.officeBearers.includes(u.id) ? ' selected' : ''}`} onClick={() => toggle('officeBearers', u.id)}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                            <div className="avatar" style={{ background: f.officeBearers.includes(u.id) ? '#c7d2fe' : '#334155', color: f.officeBearers.includes(u.id) ? '#4338ca' : '#cbd5e1' }}>{u.initials}</div>
                                            <div><div style={{ fontWeight: 700, fontSize: 14 }}>{u.name}</div><div style={{ fontSize: 12, color: '#94a3b8' }}>{u.role}</div></div>
                                        </div>
                                        <div style={{ width: 22, height: 22, borderRadius: '50%', border: `2px solid ${f.officeBearers.includes(u.id) ? '#D4AF37' : '#334155'}`, background: f.officeBearers.includes(u.id) ? '#D4AF37' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', flexShrink: 0 }}>
                                            {f.officeBearers.includes(u.id) && <Icon n="check" size={12} color="#fff" />}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: '#1A1A1A', borderTop: '1px solid #334155', padding: '12px 16px 20px', display: 'flex', gap: 10, maxWidth: 640, margin: '0 auto', zIndex: 100 }}>
                        <button className="btn btn-secondary" style={{ flex: 1, padding: '13px 0' }} onClick={() => save('Draft')} disabled={saving}>Save Draft</button>
                        <button className="btn btn-primary" style={{ flex: 1.5, padding: '13px 0' }} onClick={() => save('Under Review')} disabled={saving}>{saving ? 'Publishing&#8230;' : 'Publish for Review'}</button>
                    </div>
                </div>
            );
        };


        /* ─────────────────────────── MOM DETAIL ─────────────────────────── */
        const MOMDetail = ({ mom, onBack, onSign, onAddComment, onEdit, onPublish, onDelete, onExport, currentUser, userMap }) => {
            const [comment, setComment] = React.useState('');

            const addComment = () => {
                if (!comment.trim()) return;
                onAddComment(mom.id, { id: 'c' + Date.now(), userId: currentUser.id, text: comment, ts: new Date().toISOString() });
                setComment('');
            };

            const isManager = currentUser.role === 'Society Manager';
            const isDraft = mom.status === 'Draft';
            const alreadySigned = mom.signatures.some(s => s.userId === currentUser.id);
            const fullySignedMOM = mom.status === 'Fully Signed';
            const isOfficeBearerForMOM = mom.officeBearers.includes(currentUser.id);
            const canSign = isOfficeBearerForMOM && !alreadySigned && !fullySignedMOM && !isDraft;

            return (
                <div className="fade" style={{ paddingBottom: 90 }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, margin: -8, color: '#cbd5e1' }} onClick={onBack}><Icon n="arrowLeft" size={24} /></button>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <Badge status={mom.status} />
                        </div>
                    </div>
                    <h1 style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.3, marginBottom: 4 }}>{mom.title}</h1>
                    <p style={{ margin: '0 0 16px', fontSize: 13, color: '#94a3b8' }}>Published {fmtDate(mom.createdAt)}</p>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                        <div className="card" style={{ padding: 14 }}>
                            <div style={{ fontSize: 10, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>Date &amp; Time</div>
                            <div style={{ fontSize: 13, fontWeight: 700 }}>{mom.date} {mom.time}</div>
                        </div>
                        <div className="card" style={{ padding: 14 }}>
                            <div style={{ fontSize: 10, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>Signatories</div>
                            <div style={{ fontSize: 13, fontWeight: 700 }}>{mom.officeBearers.length} members</div>
                        </div>
                    </div>

                    <div className="card" style={{ padding: 16, marginBottom: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Agenda</div>
                        <p style={{ margin: 0, fontStyle: 'italic', color: '#f1f5f9', lineHeight: 1.6 }}>"{mom.agenda}"</p>
                    </div>

                    <div className="card" style={{ padding: 16, marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>MOM Notes</div>
                        <p style={{ margin: 0, color: '#f1f5f9', lineHeight: 1.7, whiteSpace: 'pre-wrap' }}>{mom.content}</p>
                    </div>

                    {/* Signatures */}
                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Signatures</div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            {mom.officeBearers.map(uid => {
                                const u = userMap[uid];
                                const s = mom.signatures.find(x => x.userId === uid);
                                return (
                                    <div key={uid} className="card" style={{ padding: '14px 16px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: s ? 12 : 0 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                                <div style={{ width: 10, height: 10, borderRadius: '50%', background: s ? '#10b981' : '#334155', flexShrink: 0 }} />
                                                <div>
                                                    <div style={{ fontWeight: 700, fontSize: 13 }}>{u?.name}</div>
                                                    <div style={{ fontSize: 11, color: '#94a3b8' }}>{u?.role}</div>
                                                </div>
                                            </div>
                                            {s
                                                ? <div style={{ textAlign: 'right' }}>
                                                    <div style={{ fontSize: 10, fontWeight: 800, color: '#059669', textTransform: 'uppercase' }}>Signed ✓</div>
                                                    <div style={{ fontSize: 11, color: '#94a3b8' }}>{fmtDate(s.timestamp)}</div>
                                                </div>
                                                : <span style={{ fontSize: 11, color: '#f59e0b', fontWeight: 700, background: '#fffbeb', padding: '3px 10px', borderRadius: 999 }}>Pending</span>
                                            }
                                        </div>
                                        {/* Show actual signature if signed */}
                                        {s && (
                                            <div style={{ borderTop: '1px dashed #334155', paddingTop: 10, marginTop: 2 }}>
                                                {s.type === 'drawn' && s.data && s.data !== 'uploaded' ? (
                                                    <img src={s.data} alt="signature" style={{ maxHeight: 60, maxWidth: '100%', display: 'block', filter: 'brightness(1.5) contrast(1.2)' }} />
                                                ) : s.type === 'type' || (s.type === 'typed') ? (
                                                    <div style={{ fontFamily: 'Dancing Script,cursive', fontSize: 26, color: '#D4AF37', lineHeight: 1.2 }}>{u?.name}</div>
                                                ) : s.type === 'upload' ? (
                                                    <div style={{ fontSize: 12, color: '#D4AF37', fontStyle: 'italic' }}>📤 Signature uploaded</div>
                                                ) : (
                                                    <div style={{ fontFamily: 'Dancing Script,cursive', fontSize: 26, color: '#D4AF37', lineHeight: 1.2 }}>{u?.name}</div>
                                                )}
                                                <div style={{ fontSize: 10, color: '#94a3b8', marginTop: 4, textTransform: 'capitalize' }}>via {s.type} · {fmtDate(s.timestamp)}</div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Comments */}
                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Discussion ({mom.comments.length})</div>
                        {mom.comments.length === 0 && (
                            <div style={{ textAlign: 'center', padding: '16px 0', color: '#cbd5e1', fontSize: 13 }}>No comments yet. Be the first!</div>
                        )}
                        {mom.comments.map(c => {
                            const u = userMap[c.userId] || { name: 'Unknown', initials: '?' };
                            const isMe = c.userId === currentUser.id;
                            return (
                                <div key={c.id} style={{ display: 'flex', gap: 10, marginBottom: 12, flexDirection: isMe ? 'row-reverse' : 'row' }}>
                                    <div className="avatar" style={{ width: 32, height: 32, fontSize: 12, flexShrink: 0, background: userMap[c.userId]?.color || '#334155', color: '#fff' }}>{u.initials || u.name?.[0]}</div>
                                    <div style={{ flex: 1, maxWidth: '85%' }}>
                                        <div style={{ background: isMe ? 'rgba(212, 175, 55, 0.05)' : '#1A1A1A', borderRadius: isMe ? '12px 12px 2px 12px' : '12px 12px 12px 2px', padding: '10px 14px', border: '1px solid #334155' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, gap: 8 }}>
                                                <span style={{ fontSize: 12, fontWeight: 700, color: isMe ? '#D4AF37' : '#cbd5e1' }}>{isMe ? 'You' : u.name}</span>
                                                <span style={{ fontSize: 10, color: '#94a3b8', whiteSpace: 'nowrap' }}>{fmtTime(c.ts)}</span>
                                            </div>
                                            <p style={{ margin: 0, fontSize: 13, color: '#f8fafc' }}>{c.text}</p>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center', background: '#262626', border: '1.5px solid #334155', borderRadius: 14, padding: '8px 8px 8px 14px', marginTop: 8 }}>
                            <input style={{ flex: 1, border: 'none', outline: 'none', fontSize: 14, fontFamily: 'inherit', background: 'transparent', color: '#fff' }} placeholder="Add a comment…" value={comment} onChange={e => setComment(e.target.value)} onKeyDown={e => e.key === 'Enter' && addComment()} />
                            <button onClick={addComment} style={{ width: 36, height: 36, borderRadius: 10, background: '#D4AF37', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', flexShrink: 0 }}><Icon n="send" size={16} color="#fff" /></button>
                        </div>
                    </div>

                    {/* Audit Trail */}
                    <div style={{ marginBottom: 10 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Audit Trail</div>
                        {mom.auditTrail.map((a, i) => (
                            <div key={i} className="timeline-item">
                                <div className="tl-dot"><Icon n="checkCircle" size={16} color="#D4AF37" /></div>
                                <div style={{ paddingTop: 6 }}>
                                    <div style={{ fontWeight: 700, fontSize: 13 }}>{a.action}</div>
                                    <div style={{ fontSize: 12, color: '#94a3b8' }}>{a.user} · {fmtDate(a.ts || a.timestamp)}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Bottom bar */}
                    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: 'rgba(17, 17, 17, .98)', backdropFilter: 'blur(12px)', borderTop: '1px solid #334155', padding: '12px 16px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', maxWidth: 640, margin: '0 auto' }}>
                        <div>
                            <div style={{ fontSize: 12, color: '#94a3b8' }}>
                                {isDraft && isManager ? 'Draft — Not published yet' : fullySignedMOM ? 'All signatures collected' : isDraft ? 'Awaiting publication' : isOfficeBearerForMOM ? 'Action required' : 'Reviewing'}
                            </div>
                            <div style={{ fontSize: 14, fontWeight: 700 }}>
                                {isDraft && isManager ? '📝 Edit or Publish' : fullySignedMOM ? '✅ MOM Fully Signed' : alreadySigned ? 'You have signed this MOM' : isOfficeBearerForMOM && !isDraft ? 'Review & Sign MOM' : isDraft ? 'Awaiting Publication' : 'View Only'}
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                            {fullySignedMOM && (
                                <button className="btn btn-secondary" style={{ padding: '11px 16px', borderColor: '#D4AF37', color: '#D4AF37', background: 'rgba(212, 175, 55, 0.05)' }} onClick={() => onExport(mom)}>
                                    <Icon n="download" size={15} color="#D4AF37" /> Export PDF
                                </button>
                            )}
                            {isManager && (mom.status === 'Draft' || mom.status === 'Under Review' || mom.status === 'Partially Signed') && (
                                <>
                                    <button className="btn btn-secondary" style={{ padding: '11px 14px', borderColor: '#ef4444', color: '#ef4444', background: 'rgba(239, 68, 68, 0.05)' }} onClick={() => onDelete(mom.id)}>
                                        <Icon n="trash" size={15} color="#ef4444" />
                                    </button>
                                    <button className="btn btn-secondary" style={{ padding: '11px 16px', background: 'rgba(255,255,255,0.05)' }} onClick={() => onEdit(mom)}>
                                        <Icon n="pen" size={15} color="#D4AF37" /> Edit
                                    </button>
                                    {isDraft && (
                                        <button className="btn btn-primary" style={{ padding: '11px 16px' }} onClick={onPublish}>
                                            <Icon n="send" size={15} color="#000" /> Publish
                                        </button>
                                    )}
                                </>
                            )}
                            {!isDraft && isOfficeBearerForMOM && !fullySignedMOM && (
                                <button className={`btn ${canSign ? 'btn-primary' : 'btn-secondary'}`}
                                    style={{ padding: '11px 22px', opacity: canSign ? 1 : .6, cursor: canSign ? 'pointer' : 'not-allowed' }}
                                    onClick={canSign ? onSign : undefined}
                                    disabled={!canSign}>
                                    <Icon n="pen" size={16} color={canSign ? "#000" : "#94a3b8"} />
                                    {' '}{alreadySigned ? 'Signed ✓' : 'Sign Now'}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        /* ─────────────────────────── SIGNATURE PAD ─────────────────────────── */
        const SignaturePad = ({ onSign, onCancel, user }) => {
            const [mode, setMode] = React.useState('draw');
            const [typed, setTyped] = React.useState(user.name);
            const [drawing, setDrawing] = React.useState(false);
            const [hasSig, setHasSig] = React.useState(false);
            const canvasRef = React.useRef();

            React.useEffect(() => {
                if (mode === 'draw') {
                    // RAF to wait for modal slide-up animation so canvas has real offsetWidth
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const c = canvasRef.current;
                            if (!c) return;
                            const dpr = window.devicePixelRatio || 1;
                            c.width = c.offsetWidth * dpr;
                            c.height = c.offsetHeight * dpr;
                            const ctx = c.getContext('2d');
                            ctx.scale(dpr, dpr);
                            ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                        });
                    });
                }
            }, [mode]);

            const getPos = e => {
                const r = canvasRef.current.getBoundingClientRect();
                const src = e.touches ? e.touches[0] : e;
                return { x: src.clientX - r.left, y: src.clientY - r.top };
            };
            const startDraw = e => { const { x, y } = getPos(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); setDrawing(true); };
            const moveDraw = e => { if (!drawing) return; const { x, y } = getPos(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); setHasSig(true); };
            const endDraw = () => setDrawing(false);
            const clear = () => { const c = canvasRef.current, ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height); setHasSig(false); };

            const confirm = () => {
                let data = '';
                if (mode === 'draw') data = canvasRef.current.toDataURL();
                else if (mode === 'type') data = typed;
                else data = 'uploaded';
                onSign({ type: mode, data, timestamp: new Date().toISOString(), userName: user.name, userRole: user.role });
            };

            const canConfirm = (mode === 'draw' && hasSig) || (mode === 'type' && typed.trim()) || (mode === 'upload');

            return (
                <div style={{ padding: '0 20px 20px' }}>
                    <div className="sig-tab-bar" style={{ marginBottom: 20 }}>
                        {['draw', 'type', 'upload'].map(m => <button key={m} className={`sig-tab${mode === m ? ' active' : ''}`} onClick={() => { setMode(m); setHasSig(false); }}>{m === 'draw' ? '✍️ Draw' : m === 'type' ? 'T Type' : '⬆️ Upload'}</button>)}
                    </div>

                    {mode === 'draw' && (
                        <div style={{ position: 'relative', background: '#262626', borderRadius: 16, border: '2px dashed #334155', overflow: 'hidden', marginBottom: 12 }}>
                            <canvas ref={canvasRef} style={{ display: 'block', width: '100%', height: 180, cursor: 'crosshair' }}
                                onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
                                onTouchStart={e => { e.preventDefault(); startDraw(e); }} onTouchMove={e => { e.preventDefault(); moveDraw(e); }} onTouchEnd={endDraw} />
                            {!hasSig && <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#cbd5e1', fontSize: 14, pointerEvents: 'none' }}>Sign here with your finger or mouse</div>}
                            {hasSig && <button onClick={clear} style={{ position: 'absolute', top: 8, right: 8, background: 'rgba(255,255,255,.9)', border: '1px solid #334155', borderRadius: 8, padding: '4px 10px', cursor: 'pointer', fontSize: 12, color: '#ef4444', display: 'flex', alignItems: 'center', gap: 4 }}><Icon n="refresh" size={14} color="#ef4444" />Clear</button>}
                        </div>
                    )}

                    {mode === 'type' && (
                        <div style={{ marginBottom: 12 }}>
                            <input className="input-field" style={{ textAlign: 'center', fontFamily: 'Dancing Script,cursive', fontSize: 28, color: '#D4AF37', padding: '16px' }} value={typed} onChange={e => setTyped(e.target.value)} placeholder="Type your name…" />
                            <p style={{ textAlign: 'center', fontSize: 11, color: '#94a3b8', marginTop: 8 }}>This will appear as your digital signature</p>
                        </div>
                    )}

                    {mode === 'upload' && (
                        <label style={{ display: 'block', background: '#262626', border: '2px dashed #334155', borderRadius: 16, padding: 32, textAlign: 'center', cursor: 'pointer', marginBottom: 12 }}>
                            <Icon n="upload" size={36} color="#94a3b8" />
                            <p style={{ margin: '10px 0 4px', fontWeight: 700, color: '#f1f5f9' }}>Tap to upload signature</p>
                            <p style={{ margin: 0, fontSize: 12, color: '#94a3b8' }}>PNG or JPG, max 5MB</p>
                            <input type="file" accept="image/*" style={{ display: 'none' }} />
                        </label>
                    )}

                    <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 12, padding: '10px 14px', marginBottom: 16, display: 'flex', gap: 10 }}>
                        <Icon n="shield2" size={18} color="#d97706" />
                        <p style={{ margin: 0, fontSize: 11, color: '#92400e', lineHeight: 1.6 }}>By confirming, I agree that this constitutes my legally binding electronic signature on the Society MOM.</p>
                    </div>

                    <div style={{ display: 'flex', gap: 10 }}>
                        <button className="btn btn-secondary" style={{ flex: 1, padding: '13px 0' }} onClick={onCancel}>Cancel</button>
                        <button className="btn btn-primary" style={{ flex: 1, padding: '13px 0' }} onClick={confirm} disabled={!canConfirm}>Confirm Signature</button>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── NOTIFICATIONS ─────────────────────────── */
        const NotifPanel = ({ onClose }) => (
            <div style={{ position: 'fixed', inset: 0, zIndex: 300 }} onClick={onClose}>
                <div style={{ position: 'absolute', top: 58, right: 12, width: 290, background: '#262626', borderRadius: 16, boxShadow: '0 8px 32px rgba(0,0,0,.15)', border: '1px solid #334155', overflow: 'hidden' }} onClick={e => e.stopPropagation()}>
                    <div style={{ padding: '14px 16px', fontWeight: 700, fontSize: 14, borderBottom: '1px solid #334155' }}>Notifications</div>
                    {NOTIFICATIONS.map(n => (
                        <div key={n.id} style={{ display: 'flex', gap: 12, padding: '12px 16px', background: n.read ? '#262626' : 'rgba(212, 175, 55, 0.05)', borderBottom: '1px solid #334155' }}>
                            <div style={{ width: 32, height: 32, borderRadius: 10, background: n.read ? '#334155' : 'rgba(212, 175, 55, 0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                <Icon n="info" size={16} color={n.read ? '#94a3b8' : '#D4AF37'} />
                            </div>
                            <div><p style={{ margin: '0 0 3px', fontSize: 12, color: '#f8fafc', lineHeight: 1.4 }}>{n.text}</p><p style={{ margin: 0, fontSize: 11, color: '#94a3b8' }}>{n.time}</p></div>
                        </div>
                    ))}
                </div>
            </div>
        );

        /* ─────────────────────────── MODAL ─────────────────────────── */
        const Modal = ({ title, children, onClose }) => (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-box" onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                        <span style={{ fontSize: 16, fontWeight: 700 }}>{title}</span>
                        <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#94a3b8' }} onClick={onClose}><Icon n="x" size={22} /></button>
                    </div>
                    <div style={{ padding: '16px 0' }}>{children}</div>
                </div>
            </div>
        );

        /* ─────────────────────────── MOMS LIST VIEW ─────────────────────────── */
        const MOMsView = ({ moms, onMOM }) => {
            const [filter, setFilter] = React.useState('All');
            const statuses = ['All', 'Draft', 'Under Review', 'Partially Signed', 'Fully Signed'];
            const filtered = filter === 'All' ? moms : moms.filter(m => m.status === filter);
            return (
                <div className="fade">
                    <h1 style={{ margin: '0 0 4px', fontSize: 22, fontWeight: 700 }}>All MOMs</h1>
                    <p style={{ margin: '0 0 16px', fontSize: 13, color: '#64748b' }}>{moms.length} total documents</p>

                    {/* Filter pills */}
                    <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 8, marginBottom: 16, scrollbarWidth: 'none' }}>
                        {statuses.map(s => (
                            <button key={s} onClick={() => setFilter(s)}
                                style={{
                                    flexShrink: 0, padding: '6px 14px', borderRadius: 999, border: '1.5px solid', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                                    background: filter === s ? '#D4AF37' : '#262626',
                                    color: filter === s ? '#000' : '#94a3b8',
                                    borderColor: filter === s ? '#D4AF37' : '#334155'
                                }}>
                                {s}
                            </button>
                        ))}
                    </div>

                    {filtered.length === 0 && (
                        <div style={{ textAlign: 'center', padding: '48px 0', color: '#94a3b8' }}>
                            <div style={{ fontSize: 40, marginBottom: 8 }}>📄</div>
                            <p style={{ margin: 0, fontWeight: 600 }}>No MOMs found</p>
                            <p style={{ margin: '4px 0 0', fontSize: 13 }}>Try a different filter</p>
                        </div>
                    )}

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        {filtered.map(m => {
                            const sigPct = m.officeBearers.length ? Math.round((m.signatures.length / m.officeBearers.length) * 100) : 0;
                            return (
                                <div key={m.id} className="card" style={{ padding: 16, cursor: 'pointer' }} onClick={() => onMOM(m)}>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8, marginBottom: 10 }}>
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{m.title}</div>
                                            <div style={{ fontSize: 12, color: '#94a3b8', display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                                                <span>📅 {m.date} {m.time}</span>
                                            </div>
                                        </div>
                                        <Badge status={m.status} />
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                        <div style={{ flex: 1, height: 4, borderRadius: 999, background: '#f1f5f9', overflow: 'hidden' }}>
                                            <div style={{ height: '100%', borderRadius: 999, background: m.status === 'Fully Signed' ? '#10b981' : m.status === 'Partially Signed' ? '#D4AF37' : '#f59e0b', width: sigPct + '%', transition: 'width .4s' }} />
                                        </div>
                                        <span style={{ fontSize: 11, color: '#94a3b8', whiteSpace: 'nowrap' }}>{m.signatures.length}/{m.officeBearers.length} signed</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── AUDIT TRAIL VIEW ─────────────────────────── */
        const AuditView = ({ moms }) => {
            // Flatten all audit entries across all MOMs
            const allEvents = moms.flatMap(m =>
                (m.auditTrail || []).map(a => ({
                    ...a,
                    momTitle: m.title,
                    momId: m.id,
                    status: m.status,
                }))
            ).sort((a, b) => new Date(b.ts || b.timestamp) - new Date(a.ts || a.timestamp));

            const actionColor = a => ({
                'Created': '#94a3b8', 'Published': '#f59e0b', 'Reviewed': '#3b82f6',
                'Signed': '#10b981', 'Edited': '#a855f7'
            }[a] || '#94a3b8');

            const actionIcon = a => ({
                'Created': '📝', 'Published': '📢', 'Reviewed': '👁️', 'Signed': '✅', 'Edited': '✏️'
            }[a] || '📋');

            return (
                <div className="fade">
                    <h1 style={{ margin: '0 0 4px', fontSize: 22, fontWeight: 700 }}>Audit Trail</h1>
                    <p style={{ margin: '0 0 20px', fontSize: 13, color: '#64748b' }}>{allEvents.length} total events across all MOMs</p>

                    {allEvents.length === 0 && (
                        <div style={{ textAlign: 'center', padding: '48px 0', color: '#94a3b8' }}>
                            <div style={{ fontSize: 40, marginBottom: 8 }}>🔍</div>
                            <p style={{ margin: 0, fontWeight: 600 }}>No audit events yet</p>
                        </div>
                    )}

                    <div style={{ position: 'relative' }}>
                        {allEvents.length > 0 && <div style={{ position: 'absolute', left: 16, top: 0, bottom: 0, width: 2, background: '#334155', zIndex: 0 }} />}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
                            {allEvents.map((a, i) => (
                                <div key={i} style={{ display: 'flex', gap: 14, paddingBottom: 20, position: 'relative', zIndex: 1 }}>
                                    <div style={{ width: 34, height: 34, borderRadius: '50%', background: '#262626', border: '2px solid #334155', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 16 }}>
                                        {actionIcon(a.action)}
                                    </div>
                                    <div className="card" style={{ flex: 1, padding: '12px 14px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
                                            <span style={{ fontWeight: 700, fontSize: 13, color: actionColor(a.action) }}>{a.action}</span>
                                            <span style={{ fontSize: 10, color: '#94a3b8' }}>{fmtDate(a.ts || a.timestamp)}</span>
                                        </div>
                                        <div style={{ fontSize: 13, color: '#f1f5f9', marginBottom: 4 }}>{a.user}</div>
                                        <div style={{ fontSize: 11, color: '#94a3b8', background: '#262626', borderRadius: 6, padding: '4px 8px', display: 'inline-block' }}>{a.momTitle}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────── TASK TRACKER COMPONENTS ─────────────────────────── */

        const getAgingDays = dateStr => {
            const diffTime = Math.abs(new Date() - new Date(dateStr));
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        };

        const getAgingColor = days => {
            if (days <= 3) return '#10b981'; // Green
            if (days <= 7) return '#f59e0b'; // Orange
            return '#ef4444'; // Red
        };

        const TasksDashboard = ({ tasks, onTask, userMap }) => {
            const pending = tasks.filter(t => t.status === 'Pending').length;
            const inProgress = tasks.filter(t => t.status === 'In Progress').length;
            const completed = tasks.filter(t => t.status === 'Completed').length;
            
            const now = new Date();
            const overdue = tasks.filter(t => t.status !== 'Completed' && new Date(t.dueDate) < now).length;
            const aging7Plus = tasks.filter(t => t.status !== 'Completed' && getAgingDays(t.createdAt) > 7).length;

            const highPriority = tasks.filter(t => t.status !== 'Completed' && t.priority === 'Critical').slice(0, 3);
            const recentCompleted = tasks.filter(t => t.status === 'Completed').slice(0, 3);

            const exportTasks = () => {
                const headers = ['Task ID', 'Title', 'Category', 'Priority', 'Status', 'Created Date', 'Created By', 'Assigned To', 'Aging (Days)', 'Description'];
                const rows = tasks.map(t => [
                    t.id, 
                    `"${t.title.replace(/"/g, '""')}"`,
                    t.category,
                    t.priority,
                    t.status,
                    t.createdAt.split('T')[0],
                    `"${userMap[t.createdBy]?.name || 'System'}"`,
                    `"${userMap[t.assignedTo]?.name || 'Unassigned'}"`,
                    getAgingDays(t.createdAt),
                    `"${t.description.replace(/"/g, '""')}"`
                ].join(','));
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows].join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Task_Report_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="fade" style={{ paddingBottom: 90 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                        <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>Dashboard</h1>
                        <button className="btn btn-secondary" style={{ padding: '6px 12px', fontSize: 12, display: 'flex', alignItems: 'center', gap: 6 }} onClick={exportTasks}>
                            <Icon n="download" size={14} /> Export CSV
                        </button>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                        <div className="card" style={{ padding: 16, borderLeft: '4px solid #3b82f6' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: '#94a3b8', textTransform: 'uppercase' }}>Total Tasks</div>
                            <div style={{ fontSize: 24, fontWeight: 800, color: '#f8fafc' }}>{tasks.length}</div>
                        </div>
                        <div className="card" style={{ padding: 16, borderLeft: '4px solid #10b981' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: '#10b981', textTransform: 'uppercase' }}>Completed</div>
                            <div style={{ fontSize: 24, fontWeight: 800, color: '#f8fafc' }}>{completed}</div>
                        </div>
                        <div className="card" style={{ padding: 16, borderLeft: '4px solid #f59e0b' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: '#f59e0b', textTransform: 'uppercase' }}>Pending</div>
                            <div style={{ fontSize: 24, fontWeight: 800, color: '#f8fafc' }}>{pending + inProgress}</div>
                        </div>
                        <div className="card" style={{ padding: 16, borderLeft: '4px solid #ef4444' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: '#ef4444', textTransform: 'uppercase' }}>Overdue &gt; 7d</div>
                            <div style={{ fontSize: 24, fontWeight: 800, color: '#f8fafc' }}>{overdue} / {aging7Plus}</div>
                        </div>
                    </div>

                    <h2 style={{ fontSize: 16, fontWeight: 700, margin: '0 0 12px' }}>Critical Action Required</h2>
                    {highPriority.length === 0 ? (
                        <div style={{ padding: 16, textAlign: 'center', color: '#94a3b8', fontSize: 13 }}>No critical tasks! 🎉</div>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
                            {highPriority.map(t => (
                                <div key={t.id} className="card" style={{ padding: 14, borderLeft: '4px solid #ef4444' }} onClick={() => onTask(t)}>
                                    <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{t.title}</div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#94a3b8' }}>
                                        <span>Aging: {getAgingDays(t.createdAt)} days</span>
                                        <span>By: {userMap[t.createdBy]?.name || 'System'}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const TaskListView = ({ tasks, onTask, userMap }) => {
            const [filter, setFilter] = React.useState('All');
            const statuses = ['All', 'Pending', 'In Progress', 'Completed'];
            const filtered = filter === 'All' ? tasks : tasks.filter(t => t.status === filter);

            return (
                <div className="fade" style={{ paddingBottom: 90 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                        <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>All Tasks</h1>
                    </div>
                    {/* Filter pills */}
                    <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 8, marginBottom: 16, scrollbarWidth: 'none' }}>
                        {statuses.map(s => (
                            <button key={s} onClick={() => setFilter(s)}
                                style={{
                                    flexShrink: 0, padding: '6px 14px', borderRadius: 999, border: '1.5px solid', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                                    background: filter === s ? '#D4AF37' : '#262626',
                                    color: filter === s ? '#000' : '#94a3b8',
                                    borderColor: filter === s ? '#D4AF37' : '#334155'
                                }}>
